
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital | AI Software</title>
    <style>
        :root {
            --fondo: #fba667; 
            --mint: #45c4a0;  
            --pink: #f26d7d;  
            --peach: #f39c12; 
            --lavender: #7487f1; 
            --marron-marca: #3d241e; 
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 25px 0; }
        .header h1 {
            color: var(--marron-marca);
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 1px 1px 0px white;
        }

        .scroll-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-block {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .column-title {
            color: var(--marron-marca);
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-option {
            border: none;
            padding: 10px 2px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: white;
        }

        .btn-option.active { 
            outline: 3px solid var(--marron-marca); 
            transform: scale(0.95);
            box-shadow: none;
            filter: brightness(0.9);
        }

        .btn-pink { background: var(--pink); }
        .btn-mint { background: var(--mint); }
        .btn-lavender { background: var(--lavender); }
        .btn-peach { background: var(--peach); }

        .prompt-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid var(--marron-marca);
            border-radius: 25px;
            padding: 15px;
            margin-top: 20px;
            position: sticky;
            bottom: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 100;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            border: 2px solid var(--marron-marca);
            background: white;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--marron-marca);
        }

        .btn-lang.active { background: var(--marron-marca); color: white; }

        .display-area {
            background: #fff8f0;
            padding: 10px;
            border-radius: 12px;
            min-height: 40px;
            font-size: 0.75rem;
            color: #222;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            line-height: 1.4;
            text-align: left;
        }

        .display-area.active-box { border: 2px solid var(--peach); background: #fffcf0; }

        .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        
        .btn-action {
            padding: 10px 15px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            flex: 1;
        }
        .btn-copy { background: #e67e22; }
        .btn-clear { background: #3498db; }
        .btn-others { background: #9b59b6; }

        .back-link { text-decoration: none; color: var(--marron-marca); font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>ARBELO DIGITAL</h1>
    </div>

    <div class="scroll-container">
        
        <div class="category-block">
            <div class="column-title">🌸 Nicho de Mercado</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this, 'UGC Creator', 'Creadora UGC')">UGC</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Business Mentor', 'Mentora de Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Skincare Luxe', 'Lujo en Piel')">Belleza</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'E-commerce Shop', 'Tienda Online')">E-com</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Fashion Designer', 'Diseño de Moda')">Moda</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Content Creator', 'Creadora de Contenido')">Influencer</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🎨 Material & Textura</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggle(this, 'High-end Silk', 'Seda de lujo')">Seda</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Polished Marble', 'Mármol Pulido')">Mármol</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Golden details', 'Detalles en oro')">Oro</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">💡 Iluminación</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Softbox lighting', 'Luz de Softbox')">Suave</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Golden hour', 'Luz de atardecer')">Golden</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Natural daylight', 'Luz natural')">Natural</button>
            </div>
        </div>

        <div class="prompt-box">
            <div class="lang-selector">
                <button id="btn-en" class="btn-lang active" onclick="setCopyLang('en')">INGLÉS</button>
                <button id="btn-es" class="btn-lang" onclick="setCopyLang('es')">ESPAÑOL</button>
            </div>

            <div style="font-size: 0.6rem; font-weight: bold; color: var(--marron-marca); margin-bottom: 2px;">🇺🇸 PROMPT (EN):</div>
            <div id="result-en" class="display-area active-box">Waiting...</div>

            <div style="font-size: 0.6rem; font-weight: bold; color: var(--marron-marca); margin-bottom: 2px;">🇪🇸 TRADUCCIÓN (ES):</div>
            <div id="result-es" class="display-area">Esperando...</div>

            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyResult()">♥ COPIAR</button>
                <button class="btn-action btn-others" onclick="addOthers()">OTROS IA</button>
                <button class="btn-action btn-clear" onclick="clearAll()">BORRAR</button>
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <script>
        let selectedEN = [];
        let selectedES = [];
        let othersEN = "";
        let othersES = "";
        let activeLang = 'en';

        function toggle(btn, en, es) {
            btn.classList.toggle('active');
            if (selectedEN.includes(en)) {
                selectedEN = selectedEN.filter(i => i !== en);
                selectedES = selectedES.filter(i => i !== es);
            } else {
                selectedEN.push(en);
                selectedES.push(es);
            }
            update();
        }

        function setCopyLang(lang) {
            activeLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('result-en').classList.toggle('active-box', lang === 'en');
            document.getElementById('result-es').classList.toggle('active-box', lang === 'es');
        }

        function addOthers() {
            if (othersEN === "") {
                othersEN = ", photorealistic, 8k, highly detailed";
                othersES = ", fotorealista, 8k, muy detallado";
            } else {
                othersEN = ""; othersES = "";
            }
            update();
        }

        function update() {
            const resEN = document.getElementById('result-en');
            const resES = document.getElementById('result-es');
            let finalEN = selectedEN.join(", ") + othersEN;
            let finalES = selectedES.join(", ") + othersES;
            resEN.innerText = finalEN.length > 0 ? finalEN : "Waiting...";
            resES.innerText = finalES.length > 0 ? finalES : "Esperando...";
        }

        function clearAll() {
            selectedEN = []; selectedES = []; othersEN = ""; othersES = "";
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            update();
        }

        function copyResult() {
            const target = activeLang === 'en' ? 'result-en' : 'result-es';
            const text = document.getElementById(target).innerText;
            if (text.includes("Waiting") || text.includes("Esperando")) return;
            navigator.clipboard.writeText(text);
            alert("♥ Copiado en " + (activeLang === 'en' ? "Inglés" : "Español"));
        }
    </script>
</body>
</html>
