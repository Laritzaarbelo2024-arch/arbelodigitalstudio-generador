<style>
body {
  font-family: Inter, sans-serif;
  background: #121212;
  color: #e0e0e0;
  margin: 0;
  padding: 20px;
}

#prompt-system {
  max-width: 900px;
  margin: auto;
}

/* BOTONES */
button {
  background: #1f1f1f;
  border: 1px solid #2e2e2e;
  color: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  margin: 4px 4px 4px 0;
  transition: 0.2s ease;
}

button:hover {
  background: #2b2b2b;
}

/* BLOQUES */
.section {
  margin-top: 16px;
  border-radius: 12px;
  background: #1a1a1a;
  border: 1px solid #272727;
  overflow: hidden;
}

.section h3 {
  margin: 0;
  padding: 14px 16px;
  background: #181818;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section h3::after {
  content: "▸";
}

.section.open h3::after {
  content: "▾";
}

.content {
  display: none;
  padding: 10px 16px;
  flex-wrap: wrap;
  gap: 6px;
}

.section.open .content {
  display: flex;
}

/* 🔻 RECUADRO ABAJO */
#output {
  width: 100%;
  min-height: 180px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: #1c1c1c;
  color: #fff;
  font-size: 14px;
  resize: vertical;
  margin-top: 20px;
}
</style>

<div id="prompt-system">

<!-- BLOQUES -->

<div class="section open">
  <h3 onclick="toggle(this)">SUJETO</h3>
  <div class="content">
    <button onclick="add('luxury business woman')">Ejecutiva</button>
    <button onclick="add('male entrepreneur')">Emprendedor</button>
    <button onclick="add('fitness influencer')">Fitness</button>
    <button onclick="add('beauty model')">Modelo</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">ESCENA</h3>
  <div class="content">
    <button onclick="add('modern luxury office')">Oficina lujo</button>
    <button onclick="add('city skyline at sunset')">Sunset</button>
    <button onclick="add('studio clean background')">Estudio</button>
    <button onclick="add('urban night street')">Noche</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">FOTOGRAFÍA</h3>
  <div class="content">
    <button onclick="add('85mm lens')">85mm</button>
    <button onclick="add('shallow depth of field')">Bokeh</button>
    <button onclick="add('centered composition')">Composición</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">ILUMINACIÓN</h3>
  <div class="content">
    <button onclick="add('soft diffused lighting')">Suave</button>
    <button onclick="add('cinematic lighting')">Cine</button>
    <button onclick="add('golden hour light')">Golden</button>
    <button onclick="add('studio softbox lighting')">Estudio</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">PIEL Y TEXTURA</h3>
  <div class="content">
    <button onclick="add('realistic skin texture, visible pores')">Piel real</button>
    <button onclick="add('subsurface scattering skin')">SSS</button>
    <button onclick="add('hair strands ultra detail')">Pelo</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">COLORIMETRÍA</h3>
  <div class="content">
    <button onclick="add('cinematic color grading')">Cine</button>
    <button onclick="add('warm luxury tones')">Cálido</button>
    <button onclick="add('muted aesthetic palette')">Suave</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">UGC</h3>
  <div class="content">
    <button onclick="add('iPhone camera look')">iPhone</button>
    <button onclick="add('natural indoor lighting')">Natural</button>
    <button onclick="add('authentic lifestyle scene')">Lifestyle</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">INFLUENCER</h3>
  <div class="content">
    <button onclick="add('lifestyle influencer content')">Lifestyle</button>
    <button onclick="add('beauty influencer aesthetic')">Beauty</button>
    <button onclick="add('morning vlog style')">Vlog</button>
  </div>
</div>

<div class="section">
  <h3 onclick="toggle(this)">E-COMMERCE</h3>
  <div class="content">
    <button onclick="add('clean product advertising shot')">Producto</button>
    <button onclick="add('premium ecommerce visual style')">Premium</button>
  </div>
</div>

<!-- 🔻 RECUADRO ABAJO -->
<textarea id="output" placeholder="Tu prompt se genera aquí..."></textarea>

<div>
  <button onclick="copyText()">Copiar</button>
  <button onclick="clearText()">Borrar</button>
</div>

</div>

<script>
function add(text){
  let output = document.getElementById("output");
  output.value += (output.value ? ", " : "") + text;
}

function clearText(){
  document.getElementById("output").value = "";
}

function copyText(){
  let output = document.getElementById("output");
  output.select();
  document.execCommand("copy");
}

function toggle(el){
  el.parentElement.classList.toggle("open");
}
</script>
