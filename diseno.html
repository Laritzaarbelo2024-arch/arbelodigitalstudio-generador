
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Studio | AI Prompting</title>
    <style>
        :root {
            --fondo: #fcebd5; /* Color de fondo un poco más intenso */
            --mint: #b9e5d8;
            --pink: #ffcfd2;
            --peach: #fde4cf;
            --lavender: #cfd9fd;
            --texto-marron: #6b5e4c;
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 20px 0;
        }

        .header h1 {
            color: #d48374;
            font-size: 1.4rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-block {
            background: white;
            padding: 12px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .column-title {
            color: var(--texto-marron);
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .btn-option {
            border: none;
            padding: 6px 2px; /* Botones más pequeños */
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.68rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 0 rgba(0,0,0,0.02);
        }

        .btn-option:active { transform: translateY(1px); }
        .btn-option.active { outline: 2px solid var(--texto-marron); filter: brightness(0.95); }

        .btn-pink { background: var(--pink); color: #c45a61; }
        .btn-mint { background: var(--mint); color: #4a7a6c; }
        .btn-lavender { background: var(--lavender); color: #6675b0; }
        .btn-peach { background: var(--peach); color: #b08a66; }

        /* CAJA DE TEXTO BONITA (Glassmorphism style) */
        .prompt-box {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #e5ccac;
            border-radius: 22px;
            padding: 15px;
            margin-top: 15px;
            position: sticky;
            bottom: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        #result {
            background: #fffcf0;
            padding: 10px;
            border-radius: 12px;
            min-height: 40px;
            font-size: 0.75rem;
            color: var(--texto-marron);
            margin-bottom: 10px;
            border: 1px inset #f3e5d0;
            line-height: 1.3;
        }

        .actions { display: flex; justify-content: center; gap: 8px; }
        .btn-action {
            padding: 8px 18px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-copy { background: #f08a70; }
        .btn-clear { background: #8ba3f0; }

        .back-link { text-decoration: none; color: #b08a66; font-size: 0.7rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>ARBELO STUDIO</h1>
    </div>

    <div class="scroll-container">
        
        <div class="category-block">
            <div class="column-title">🌸 Categoría</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="addText(this, 'Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Servicios')">Servicios</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Lifestyle')">Lifestyle</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🎨 Material</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="addText(this, 'Seda')">Seda</button>
                <button class="btn-option btn-mint" onclick="addText(this, 'Mármol')">Mármol</button>
                <button class="btn-option btn-mint" onclick="addText(this, 'Vidrio')">Vidrio</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">💡 Iluminación</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="addText(this, 'Natural')">Natural</button>
                <button class="btn-option btn-lavender" onclick="addText(this, 'Studio')">Studio</button>
                <button class="btn-option btn-lavender" onclick="addText(this, 'Golden')">Golden</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">☁️ Atmósfera</div>
            <div class="options-grid">
                <button class="btn-option btn-peach" onclick="addText(this, 'Zen')">Zen</button>
                <button class="btn-option btn-peach" onclick="addText(this, 'Lujo')">Lujo</button>
                <button class="btn-option btn-peach" onclick="addText(this, 'Vintage')">Vintage</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">📷 Ángulo</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="addText(this, 'Frontal')">Frontal</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Cenital')">Cenital</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Detalle')">Detalle</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">👗 Estilo Social</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="addText(this, 'Old Money')">Old Money</button>
                <button class="btn-option btn-mint" onclick="addText(this, 'Minimal')">Minimal</button>
                <button class="btn-option btn-mint" onclick="addText(this, 'Chic')">Chic</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🌆 Escenario</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="addText(this, 'Oficina')">Oficina</button>
                <button class="btn-option btn-lavender" onclick="addText(this, 'Exterior')">Exterior</button>
                <button class="btn-option btn-lavender" onclick="addText(this, 'Mansión')">Mansión</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🖼️ Formato</div>
            <div class="options-grid">
                <button class="btn-option btn-peach" onclick="addText(this, 'Portrait')">Vertical</button>
                <button class="btn-option btn-peach" onclick="addText(this, 'Square')">Cuadrado</button>
                <button class="btn-option btn-peach" onclick="addText(this, 'Cinema')">Cine</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">✨ Acabado</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="addText(this, 'Grainy')">Grano</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Clean')">Limpio</button>
                <button class="btn-option btn-pink" onclick="addText(this, 'Soft Focus')">Suave</button>
            </div>
        </div>

        <div class="prompt-box">
            <div id="result">Generando tu visión...</div>
            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyPrompt()">♥ COPIAR</button>
                <button class="btn-action btn-clear" onclick="clearPrompt()">BORRAR</button>
            </div>
        </div>

        <div style="height: 20px;"></div>
    </div>

    <script>
        let promptParts = [];

        function addText(element, text) {
            element.classList.toggle('active');
            if(promptParts.includes(text)) {
                promptParts = promptParts.filter(item => item !== text);
            } else {
                promptParts.push(text);
            }
            updateDisplay();
        }

        function updateDisplay() {
            const res = document.getElementById('result');
            res.innerText = promptParts.length > 0 ? promptParts.join(", ") + " --v 6.0" : "Generando tu visión...";
        }

        function clearPrompt() {
            promptParts = [];
            updateDisplay();
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
        }

        function copyPrompt() {
            if(promptParts.length === 0) return;
            navigator.clipboard.writeText(document.getElementById('result').innerText);
            alert("♥ Guardado en el portapapeles");
        }
    </script>
</body>
</html>
