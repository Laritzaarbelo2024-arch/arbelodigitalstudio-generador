<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital Studio | AI Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #050505; /* Fondo negro puro */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* DISEÑO DE LOGOTIPO TÉCNICO-ARTÍSTICO (RESCATE TOTAL) */
        .brand-container {
            text-align: center;
            margin-bottom: 50px;
            line-height: 1; /* Letras muy cerquita */
        }

        .brand-main {
            font-family: 'Playfair Display', serif; /* La letra artística de tu Prompts */
            font-size: 4rem; /* Grande, gruesa y elegante */
            font-weight: 900;
            font-style: italic; /* Inclinada para estilo */
            display: block;
            margin-bottom: 5px; /* Separación sutil */
            /* DEGRADADO MAESTRO SIN AMARILLO: Rosa -> Morado -> Azul -> Verde */
            background: linear-gradient(90deg, #db2777, #7c3aed, #2563eb, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(124, 58, 237, 0.3); /* Un toque de brillo neón */
        }

        .brand-sub {
            font-family: 'Inter', sans-serif; /* La letra técnica de tu Prompts */
            font-size: 2.5rem; /* Tamaño elegante, más pequeño que arriba */
            font-weight: 900;
            letter-spacing: 15px; /* Letras muy separadas para estilo premium */
            margin-left: 20px; /* Ajuste centrado */
            text-transform: uppercase;
            /* Mismo Degradado Maestro */
            background: linear-gradient(90deg, #db2777, #7c3aed, #2563eb, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            gap: 20px;
            max-width: 450px;
            width: 90%;
        }

        /* BOTONES CON EL MISMO ESTILO TÉCNICO Y DEGRADADO */
        .btn {
            padding: 22px;
            border-radius: 12px; /* Bordes más rectos, estilo consola */
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Degradado Maestro en los botones */
            background: linear-gradient(90deg, #db2777, #7c3aed, #2563eb, #10b981);
            border: none;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.15);
        }

        /* Efecto al pasar el mouse: Brillo Neón */
        .btn:hover {
            transform: scale(1.04);
            filter: brightness(1.2);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
        }

        /* La línea de "Alquimia" superior */
        .top-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #db2777, #7c3aed, #2563eb, #10b981);
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>

    <div class="brand-container">
        <span class="brand-main">Arbelo Digital</span> <span class="brand-sub">STUDIO</span>
    </div>

    <div class="grid">
        <a href="visuales.html" class="btn">🎨 Generador Visual</a>
        <a href="prompts.html" class="btn">✍️ Mastermind Prompts</a>
        <a href="video-pro.html" class="btn">🎥 Cinematic Video</a>
    </div>
</body>
</html>
