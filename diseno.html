
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital Studio | All-Stars AI Connect</title>
    <style>
        :root { --verde: #2d5a27; --crema: #f4f9f1; --oro: #c5a059; --oscuro: #1a1a1a; --google: #4285F4; --freepik: #0062ff; --higgs: #ff0055; }
        body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--oscuro); margin:0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: white; padding: 50px; border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); border-top: 20px solid var(--verde); text-align: center; margin-bottom: 240px; }
        h1 { color: var(--verde); margin-bottom: 0px; font-size: 3rem; font-weight: 900; letter-spacing: -1px; }
        .studio-tag { color: var(--oro); font-weight: 800; font-size: 1.2rem; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 40px; }
        .section-title { background: var(--verde); color: white; padding: 15px; border-radius: 12px; font-size: 0.85rem; font-weight: 900; margin-top: 45px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-left: 10px solid var(--oro); text-align: left; }
        .category { margin-bottom: 15px; border: 1px solid #e0eadd; border-radius: 20px; overflow: hidden; text-align: left; }
        .category-header { padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--verde); }
        .category-content { display: none; padding: 25px; background: #fdfdfd; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; border-top: 1px solid #eee; }
        .category.active .category-content { display: grid; }
        .option-btn { background: white; border: 1.5px solid #d1d9cf; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; color: #444; font-weight: 600; }
        .option-btn.active { background: var(--verde); color: white; border-color: var(--verde); font-weight: 800; }

        /* Mega Consola de Herramientas IA */
        .result-area { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); max-width: 1040px; width: 95%; background: var(--oscuro); color: #eee; padding: 25px; border-radius: 35px; text-align: left; z-index: 1000; border: 2px solid var(--oro); box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .prompt-text { font-family: 'Courier New', monospace; font-size: 0.8rem; color: #a2f9a2; line-height: 1.4; white-space: pre-wrap; margin-bottom: 20px; padding-left: 15px; border-left: 4px solid var(--oro); display: block; max-height: 80px; overflow-y: auto; }
        
        .copy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .btn-ia { padding: 10px 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 0.55rem; text-transform: uppercase; color: white; transition: 0.2s; text-align: center; }
        .btn-ia:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>ARBELO</h1>
    <div class="studio-tag">Digital Studio</div>
    <div id="master-accordion"></div>
    <div style="margin-top: 40px; font-size: 0.65rem; color: #bbb; letter-spacing: 2px; font-weight: 800;">CONECTAR CON ECOSISTEMA IA</div>
</div>

<div class="result-area">
    <div id="display-prompt" class="prompt-text">Selecciona elementos para activar la ingeniería de prompts...</div>
    <div class="copy-grid">
        <button class="btn-ia" style="background:var(--google)" onclick="copyFlow()">Google Flow</button>
        <button class="btn-ia" style="background:var(--freepik)" onclick="copyFreepik()">Freepik</button>
        <button class="btn-ia" style="background:var(--higgs)" onclick="copyHiggs()">Higgsfield</button>
        <button class="btn-ia" style="background:#10a37f" onclick="copyDalle()">DALL-E 3</button>
        <button class="btn-ia" style="background:var(--oro); color:var(--oscuro)" onclick="copyGemini()">Gemini Pro</button>
    </div>
    <div style="text-align:center; margin-top:10px;"><button onclick="resetAll()" style="background:none; border:none; color:#777; cursor:pointer; font-size:0.5rem; text-decoration:underline;">Limpiar Consola</button></div>
</div>

<script>
    const sections = [
        { label: "BLOQUE 0: ADN & INDUSTRIA", cats: [
            { title: "Nicho de Negocio", key: "ind", opts: ["Mentoría Luxe", "Real Estate Pro", "Beauty & Wellness", "Joyería Fina", "E-commerce Moda", "Artesanía Luxe"] },
            { title: "Estilo Visual", key: "st", opts: ["Old Money", "Modern Luxe", "Barbie Core", "Minimalista", "3D Pixar Style", "Acuarela Luxe"] }
        ]},
        { label: "BLOQUE 1: MOCKUPS & PRODUCTO", cats: [
            { title: "Mockups (POD)", key: "pod", opts: ["Camiseta (T-shirt)", "Gorra Luxe", "Lentes de Sol", "Portada Libro 3D", "Agenda Luxe", "Botella Perfume"] },
            { title: "Accesorios", key: "acc", opts: ["Joyas de Diamante", "Vela Aromática", "Suela Roja Iconic", "Bolso de Piel"] }
        ]},
        { label: "BLOQUE 2: PERSONAJE & CABELLO", cats: [
            { title: "Identidad", key: "id", opts: ["Mujer Latina", "Elegancia Europea", "25-35 años", "45-55 años"] },
            { title: "Textura & Color", key: "ht", opts: ["Pelo Rizo", "Pelo Liso", "Pelo Ondulado", "Rubio Platino", "Rojo Vibrante", "Negro Azabache"] }
        ]},
        { label: "BLOQUE 3: ESCENARIO & LUZ", cats: [
            { title: "Ubicación", key: "env", opts: ["Oficina de Cristal", "Spa Minimalista", "Calle de París", "Estudio Podcast", "Mansión Moderna"] },
            { title: "Iluminación", key: "lit", opts: ["Golden Hour", "Luz Rembrandt", "Softbox Estudio", "Shot on iPhone"] }
        ]}
    ];

    let selections = new Set();
    const main = document.getElementById('master-accordion');

    sections.forEach(sec => {
        const sTitle = document.createElement('div'); sTitle.className = 'section-title'; sTitle.innerText = sec.label; main.appendChild(sTitle);
        sec.cats.forEach(cat => {
            const cDiv = document.createElement('div');
            cDiv.className = 'category';
            cDiv.innerHTML = `<div class="category-header" onclick="this.parentElement.classList.toggle('active')">${cat.title} <span>▼</span></div><div class="category-content"></div>`;
            main.appendChild(cDiv);
            const grid = cDiv.querySelector('.category-content');
            cat.opts.forEach(opt => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => {
                    if (selections.has(opt)) { selections.delete(opt); b.classList.remove('active'); }
                    else { selections.add(opt); b.classList.add('active'); }
                    update();
                };
                grid.appendChild(b);
            });
        });
    });

    function update() {
        document.getElementById('display-prompt').innerText = Array.from(selections).join(", ") || "Selecciona elementos...";
    }

    function copyFlow() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`Google Vids/Flow Presentation Structure: Create a high-end corporate deck based on: ${t}. Style: Arbelo Professional.`);
        alert("Google Flow Copiado 💼");
    }

    function copyFreepik() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`High-quality stock photography, ${t}, detailed, 8k, commercially licensed style`);
        alert("Freepik Copiado 📸");
    }

    function copyHiggs() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`Character video animation: ${t}, fluid movement, realistic facial expressions, cinematic lighting`);
        alert("Higgsfield Copiado 🎬");
    }

    function copyDalle() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`Create an editorial professional photo: ${t}. High-end photography style, DALL-E 3.`);
        alert("DALL-E 3 Copiado 🎨");
    }

    function copyGemini() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`Act as a brand strategist for Arbelo Studio. Analyze and create a visual concept based on these attributes: ${t}`);
        alert("Gemini Pro Copiado 💎");
    }

    function resetAll() {
        selections.clear();
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        update();
    }
</script>
</body>
</html>
