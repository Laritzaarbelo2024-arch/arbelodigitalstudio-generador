
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Vision Studio | Consola de Ingeniería IA</title>
    <style>
        :root { --verde: #2d5a27; --crema: #f4f9f1; --oro: #c5a059; --oscuro: #1a1a1a; --gpt: #10a37f; --google: #4285f4; --free: #00aaff; --higgs: #ff4d4d; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--crema); color: var(--oscuro); margin:0; padding: 20px; display: flex; justify-content: center; }
        
        .container { max-width: 900px; width: 100%; background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-top: 15px solid var(--verde); text-align: center; }
        h1 { color: var(--verde); margin-bottom: 5px; letter-spacing: -1.5px; font-size: 2.2rem; }
        .subtitle { font-size: 0.8rem; color: #999; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
        
        /* Acordeón de Categorías */
        .category { margin-bottom: 12px; border: 1px solid #eee; border-radius: 18px; overflow: hidden; text-align: left; transition: 0.3s; }
        .category-header { background: #fff; padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.95rem; color: var(--verde); }
        .category-header span { color: var(--oro); font-size: 1.2rem; transition: 0.3s; }
        .category-content { display: none; padding: 25px; background: #fcfdfb; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; border-top: 1px solid #f0f0f0; }
        .category.active { border-color: var(--verde); box-shadow: 0 5px 15px rgba(45, 90, 39, 0.05); }
        .category.active .category-content { display: grid; }
        .category.active .category-header span { transform: rotate(45deg); color: var(--verde); }

        /* Botones de Opción */
        .option-btn { background: white; border: 1px solid #e0e0e0; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: 0.3s; color: #555; }
        .option-btn:hover { border-color: var(--oro); background: #fff9f0; }
        .option-btn.active { background: var(--verde); color: white; border-color: var(--verde); transform: scale(0.97); }

        /* Consola de Control de Salida */
        .result-area { margin-top: 50px; padding: 30px; background: var(--oscuro); color: #eee; border-radius: 25px; text-align: left; position: sticky; bottom: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 2px solid var(--oro); }
        .result-label { color: var(--oro); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        .prompt-text { font-family: 'Courier New', monospace; font-size: 0.9rem; min-height: 50px; display: block; line-height: 1.6; color: #90ee90; word-break: break-word; }
        
        /* Rejilla de Botones de Copiado */
        .copy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 25px; }
        .btn-ia { padding: 14px 10px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .btn-ia:hover { transform: translateY(-3px); filter: brightness(1.2); }
        
        .btn-mj { background: var(--verde); color: white; }
        .btn-gpt { background: var(--gpt); color: white; }
        .btn-higgs { background: var(--higgs); color: white; }
        .btn-flow { background: var(--google); color: white; }
        .btn-free { background: var(--free); color: white; }
        .btn-reset { background: #444; color: white; }
        
        .back-btn { display: inline-block; margin-top: 30px; color: #bbb; text-decoration: none; font-size: 0.8rem; font-weight: 600; }
        .back-btn:hover { color: var(--verde); }
    </style>
</head>
<body>

<div class="container">
    <h1>Arbelo Vision Studio</h1>
    <div class="subtitle">Ingeniería de Prompts Premium</div>

    <div id="master-accordion"></div>

    <div class="result-area">
        <span class="result-label">PROMPT DINÁMICO ARBELO:</span>
        <span id="display-prompt" class="prompt-text">Haz clic en las categorías de arriba para diseñar...</span>
        
        <div class="copy-grid">
            <button class="btn-ia btn-mj" onclick="copyMJ()">Midjourney v6.1</button>
            <button class="btn-ia btn-gpt" onclick="copyGPT()">ChatGPT / DALL-E</button>
            <button class="btn-ia btn-higgs" onclick="copyHiggs()">Higgsfield (Video)</button>
            <button class="btn-ia btn-flow" onclick="copyFlow()">Google Flow</button>
            <button class="btn-ia btn-free" onclick="copyFree()">Freepik / Pikaso</button>
            <button class="btn-ia btn-reset" onclick="resetAll()">Limpiar Set</button>
        </div>
    </div>
    
    <a href="index.html" class="back-btn">← VOLVER AL MENÚ</a>
</div>

<script>
    const config = [
        { title: "1. Arquetipo (El Alma)", key: "sub", opts: ["CEO Visionaria", "Mentora Zen", "Creativa Rebelde", "Líder de Opinión", "Influencer de Lujo", "Coach de Negocios", "Artista Minimalista", "Estratega Digital", "Fundadora Tech", "Embajadora de Marca"] },
        { title: "2. Atuendo (Styling)", key: "out", opts: ["Blazer Sastre", "Camisa de Seda", "Suéter Cashmere", "Vestido de Lino", "Total White Look", "Traje Monocromático", "Cuello Alto", "Blusa de Satén", "Gabardina Trench", "Estilo Old Money"] },
        { title: "3. Accesorios de Poder", key: "acc", opts: ["Gafas de Lujo", "Joyas de Oro", "Reloj Alta Gama", "Perlas", "Bolso de Piel", "Cinturón Diseñador", "Pañuelo Seda", "Anillos Minimal", "Auriculares Pro", "Broche Dorado"] },
        { title: "4. Maquillaje & Rostro", key: "mk", opts: ["No-Makeup Look", "Labios Rojos", "Piel Glowy", "Mate Editorial", "Smokey Suave", "Contorno Marcado", "Labios Nude", "Piel Hidratada", "Natural Fresh", "Estilo Pasarela"] },
        { title: "5. Peinado", key: "hair", opts: ["Moño Pulido", "Ondas al Agua", "Liso Extremo", "Coleta Alta", "Cabello al Aire", "Bob Estilizado", "Trenza Lateral", "Volumen Editorial", "Recogido Chic", "Wet Look"] },
        { title: "6. Entorno Principal", key: "env", opts: ["Penthouse NYC", "Lobby Hotel 5*", "Terraza Mediterránea", "Estudio Minimal", "Biblioteca Privada", "Mansión Moderna", "Jardín Botánico", "Calle de París", "Galería de Arte", "Oficina High-Tech"] },
        { title: "7. Acción & Gesto", key: "act", opts: ["Analizando Estrategia", "Tomando Café", "Risa Natural", "Mirada de Poder", "Caminando Decidida", "Ajustando Gafas", "Grabando Podcast", "Escribiendo Agenda", "Cruzando Brazos", "Saludando"] },
        { title: "8. Tecnología & Objetos", key: "obj", opts: ["MacBook Pro", "iPhone 15 Pro", "Copa Cristal", "Flores Blancas", "Revista Vogue", "Agenda Piel", "Micrófono Pro", "Agua con Limón", "iPad Pro", "Bolígrafo Oro"] },
        { title: "9. Ángulo de Cámara", key: "ang", opts: ["Primer Plano", "Plano Medio", "Ángulo Bajo", "Ángulo Alto", "Perfil Candid", "Tres Cuartos", "Plano Americano", "Plano Detalle", "Macro", "Panorámico"] },
        { title: "10. Dispositivo & Lente", key: "len", opts: ["Shot on iPhone", "Portrait Mode", "Selfie Lujo", "85mm Pro", "35mm Street", "50mm Classic", "Wide Angle", "Macro Lens", "CCTV Style", "35mm Film"] },
        { title: "11. Iluminación Maestra", key: "lit", opts: ["Golden Hour", "Luz Ventana", "Rim Lighting", "Sombras Persiana", "Softbox Estudio", "Luz Velas", "Neón Sutil", "Luz Cenital", "Contraluz", "Luz Mañana"] },
        { title: "12. Branding Color", key: "col", opts: ["Neutros/Beige", "Blanco y Negro", "Tonos Tierra", "Azul y Oro", "Pasteles", "Monocromo", "Colores Joya", "Contraste Alto", "Tonos Desierto", "Minimal Blanco"] },
        { title: "13. Atmósfera", key: "atm", opts: ["Niebla Sutil", "Polvo de Oro", "Reflejos Cristal", "Aire Puro", "Brisa Cabello", "God Rays", "Humo Artístico", "Motion Blur", "Lens Flare", "Partículas Luz"] },
        { title: "14. Textura & Acabado", key: "fin", opts: ["Grano 35mm", "8K Digital", "Polaroid Lujo", "Mate Revista", "Brillo Vogue", "Kodachrome", "Fujicolor", "Film Noir", "Digital Clean", "Papel Textura"] },
        { title: "15. Formato de Salida", key: "siz", opts: ["Vertical 9:16", "Post 4:5", "Cuadrado 1:1", "Panorámico 16:9", "Banner", "Cinematic", "Portrait 2:3", "Story", "Reels", "FB Cover"] },
        { title: "16. Estilo Dirección", key: "sty", opts: ["UGC Style", "Editorial", "Cinematográfico", "Street Style", "Business", "Minimal", "Vanguardia", "Paparazzi", "Catálogo", "Lifestyle Relax"] },
        { title: "17. Materiales Fondo", key: "mat", opts: ["Mármol", "Madera", "Concreto", "Terciopelo", "Cristal", "Ladrillo", "Oro", "Seda", "Piedra", "Pared Blanca"] },
        { title: "18. Clima Contextual", key: "wth", opts: ["Soleado", "Otoño", "Invierno", "Primavera", "Lluvia Chic", "Nublado", "Mediodía", "Noche", "Tropical", "Niebla"] },
        { title: "19. Detalle de Piel", key: "skn", opts: ["Poros Reales", "Porcelana", "Bronceada", "Natural", "Pecas", "Esculpida", "Satinada", "Terciopelo", "Glowy", "HD Detail"] },
        { title: "20. IA Motor Pro", key: "eng", opts: ["Midjourney v6.1", "Raw Style", "Stylize 250", "Stylize 750", "Chaos 10", "High Variation", "Photographer", "Master Quality", "Octane Render", "Arbelo Engine"] }
    ];

    let state = {};
    const mainBox = document.getElementById('master-accordion');

    config.forEach((group, i) => {
        const div = document.createElement('div');
        div.className = 'category';
        div.innerHTML = `<div class="category-header" onclick="toggle(${i})">${group.title} <span>+</span></div>
                         <div class="category-content" id="box-${i}"></div>`;
        mainBox.appendChild(div);
        const grid = document.getElementById(`box-${i}`);
        group.opts.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                grid.querySelectorAll('.option-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                state[group.key] = opt;
                refresh();
            };
            grid.appendChild(b);
        });
    });

    function toggle(id) { document.querySelectorAll('.category')[id].classList.toggle('active'); }

    function refresh() {
        const p = Object.values(state).join(", ");
        document.getElementById('display-prompt').innerText = p || "Diseñando tu visión...";
    }

    function copyMJ() {
        const t = document.getElementById('display-prompt').innerText;
        const res = `${t} --v 6.1 --ar 4:5 --stylize 250 --quality 2`.replace("Vertical 9:16", "--ar 9:16");
        navigator.clipboard.writeText(res); alert("✨ Midjourney Copiado!");
    }

    function copyGPT() {
        const t = document.getElementById('display-prompt').innerText;
        const res = `Photograph of: ${t}. Photorealistic luxury editorial style, 8k.`;
        navigator.clipboard.writeText(res); alert("🎨 ChatGPT Copiado!");
    }

    function copyHiggs() {
        const t = document.getElementById('display-prompt').innerText;
        const res = `High-end cinematic motion, ${t}, 4k resolution.`;
        navigator.clipboard.writeText(res); alert("🎬 Higgsfield Copiado!");
    }

    function copyFlow() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(t); alert("🔍 Google Flow Copiado!");
    }

    function copyFree() {
        const t = document.getElementById('display-prompt').innerText;
        const res = `Premium commercial photo, ${t}, high resolution.`;
        navigator.clipboard.writeText(res); alert("📸 Freepik Copiado!");
    }

    function resetAll() {
        state = {};
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
        refresh();
    }
</script>

</body>
</html>
