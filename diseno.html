
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital | Software</title>
    <style>
        :root {
            --fondo: #fba667; 
            --mint: #45c4a0;  
            --pink: #f26d7d;  
            --peach: #f39c12; 
            --lavender: #7487f1; 
            --marron-marca: #3d241e;
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 20px 0; }
        .header h1 {
            color: var(--marron-marca);
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .scroll-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-block {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .column-title {
            color: var(--marron-marca);
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-option {
            border: none;
            padding: 10px 2px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: white;
        }

        .btn-option.active { 
            outline: 3px solid var(--marron-marca); 
            transform: scale(0.95);
            box-shadow: none;
        }

        .btn-pink { background: var(--pink); }
        .btn-mint { background: var(--mint); }
        .btn-lavender { background: var(--lavender); }
        .btn-peach { background: var(--peach); }

        /* AREA DE RESULTADOS CON SELECTOR DE IDIOMA */
        .prompt-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid var(--marron-marca);
            border-radius: 25px;
            padding: 18px;
            margin-top: 20px;
            position: sticky;
            bottom: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 100;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .lang-header {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            border: 2px solid var(--marron-marca);
            background: white;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--marron-marca);
            transition: 0.3s;
        }

        .btn-lang.active {
            background: var(--marron-marca);
            color: white;
        }

        .result-label {
            font-size: 0.65rem;
            font-weight: bold;
            color: var(--marron-marca);
            margin-bottom: 4px;
            display: block;
            text-align: left;
        }

        .display-area {
            background: #fff8f0;
            padding: 10px;
            border-radius: 12px;
            min-height: 40px;
            font-size: 0.75rem;
            color: #222;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            line-height: 1.3;
            text-align: left;
        }

        /* Ilumina el cuadro activo */
        .display-area.highlight { border: 2px solid var(--peach); background: #fffcf0; }

        .actions { display: flex; justify-content: center; gap: 6px; }
        
        .btn-action {
            padding: 10px 12px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            flex: 1;
        }
        .btn-copy { background: #e67e22; }
        .btn-clear { background: #3498db; }
        .btn-others { background: #9b59b6; }

        .back-link { text-decoration: none; color: var(--marron-marca); font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>ARBELO DIGITAL</h1>
    </div>

    <div class="scroll-container">
        
        <div class="category-block">
            <div class="column-title">🌸 Nicho</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this, 'Business Mentor', 'Mentora de Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'CEO Lifestyle', 'Estilo de vida CEO')">Lifestyle</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'E-commerce Expert', 'Experta en E-com')">Ventas</button>
            </div>
        </div>

        <div class="prompt-box">
            
            <div class="lang-header">
                <button id="btn-lang-en" class="btn-lang active" onclick="focusLang('en')">🇺🇸 INGLÉS</button>
                <button id="btn-lang-es" class="btn-lang" onclick="focusLang('es')">🇪🇸 ESPAÑOL</button>
            </div>

            <span class="result-label">PROMPT PARA IA:</span>
            <div id="result-en" class="display-area highlight">Waiting...</div>

            <span class="result-label">TU GUÍA TRADUCIDA:</span>
            <div id="result-es" class="display-area">Esperando...</div>

            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyActive()">♥ COPIAR</button>
                <button class="btn-action btn-others" onclick="addOthers()">OTROS IA</button>
                <button class="btn-action btn-clear" onclick="clearAll()">BORRAR</button>
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <script>
        let selectedEN = [];
        let selectedES = [];
        let othersEN = "";
        let othersES = "";
        let activeLang = 'en';

        function toggle(btn, en, es) {
            btn.classList.toggle('active');

                selectedES = selectedES.filter(i => i !== es);

                selectedEN.push(en);
                selectedES.push(es);
            }
            update();
        }
