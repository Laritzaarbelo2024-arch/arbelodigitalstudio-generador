
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Studio | Luxury Prompt Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5ede0;
            --card: rgba(255,252,246,0.9);
            --border: rgba(210,188,160,0.6);
            --ink: #2c2118;
            --text-light: #b0977c;
            /* Paleta de Botones Arbelo */
            --c1: #e8917a; --c2: #d4a574; --c3: #8bbfa8; --c4: #7da9c4;
            --verde: #2d5a27; --gpt: #10a37f; --higgs: #ff4d4d; --google: #4285f4; --free: #00aaff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(150,120,80,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 3rem; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            color: var(--ink);
            font-weight: 300;
        }
        .header h1 em { font-style: italic; }

        .container { max-width: 650px; width: 100%; display: flex; flex-direction: column; gap: 12px; }

        /* SECCIONES ACORDEÓN */
        .category-block {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .category-header {
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
        }

        .category-content {
            display: none;
            padding: 20px;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        .category-block.active .category-content { display: grid; }

        /* BOTONES 3D PILL CON LOS COLORES DE CATEGORÍA */
        .btn-option {
            position: relative;
            border-radius: 999px;
            border: none;
            padding: 12px 15px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.15s cubic-bezier(.34,1.56,.64,1);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.18);
            overflow: hidden;
        }

        .btn-option::before {
            content: '';
            position: absolute;
            top: 2px; left: 15%; right: 15%; height: 35%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 999px;
        }

        .btn-option:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .btn-option:active { transform: translateY(2px); border-bottom-width: 1px; }
        .btn-option.active { outline: 2px solid var(--ink); outline-offset: 2px; filter: saturate(1.4) brightness(1.1); }

        /* Variantes de Color para la Mezcla */
        .c-v1 { background: linear-gradient(160deg, #f0a090, var(--c1)); }
        .c-v2 { background: linear-gradient(160deg, #ddb880, var(--c2)); }
        .c-v3 { background: linear-gradient(160deg, #9ecfb8, var(--c3)); }
        .c-v4 { background: linear-gradient(160deg, #8cbcd4, var(--c4)); }

        /* CONSOLA DE RESULTADO MULTI-IA */
        .prompt-box {
            position: sticky;
            bottom: 20px;
            background: rgba(245, 238, 226, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 -10px 40px rgba(60,40,20,0.15);
            margin-top: 30px;
            width: 100%;
        }

        #result {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--ink);
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            min-height: 60px;
            line-height: 1.5;
        }

        .copy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-ia {
            padding: 10px 5px; border-radius: 10px; border: none; font-size: 0.6rem;
            font-weight: 800; text-transform: uppercase; cursor: pointer; color: white;
            transition: 0.2s; border-bottom: 3px solid rgba(0,0,0,0.2);
        }
        .btn-ia:active { transform: translateY(2px); border-bottom-width: 1px; }

        .btn-mj { background: var(--verde); }
        .btn-gpt { background: var(--gpt); }
        .btn-higgs { background: var(--higgs); }
        .btn-flow { background: var(--google); }
        .btn-free { background: var(--free); }
        .btn-reset { background: var(--text-light); }

        .back-link { margin-bottom: 20px; text-decoration: none; color: var(--text-light); font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>Arbelo <em>Studio</em></h1>
        <div style="font-size: 0.6rem; letter-spacing: 4px; color: var(--text-light); text-transform: uppercase; margin-top: 10px;">Visual Prompt Builder</div>
    </div>

    <div class="container" id="accordion-container"></div>

    <div class="prompt-box">
        <div id="result">Diseña tu visión seleccionando botones...</div>
        <div class="copy-grid">
            <button class="btn-ia btn-mj" onclick="copyPrompt('mj')">Midjourney</button>
            <button class="btn-ia btn-gpt" onclick="copyPrompt('gpt')">ChatGPT</button>
            <button class="btn-ia btn-higgs" onclick="copyPrompt('higgs')">Higgsfield</button>
            <button class="btn-ia btn-flow" onclick="copyPrompt('flow')">Google Flow</button>
            <button class="btn-ia btn-free" onclick="copyPrompt('free')">Freepik</button>
            <button class="btn-ia btn-reset" onclick="resetAll()">Limpiar</button>
        </div>
    </div>

    <script>
        const config = [
            { title: "1. Arquetipo", key: "sub", color: "c-v1", opts: ["CEO Visionaria", "Mentora Zen", "Creativa Rebelde", "Líder de Opinión", "Influencer"] },
            { title: "2. Atuendo", key: "out", color: "c-v2", opts: ["Blazer Sastre", "Camisa Seda", "Suéter Cashmere", "Vestido Lino", "Old Money"] },
            { title: "3. Accesorios", key: "acc", color: "c-v3", opts: ["Gafas Lujo", "Joyas Oro", "Reloj Alta Gama", "Perlas", "Bolso Piel"] },
            { title: "4. Escenario", key: "env", color: "c-v4", opts: ["Penthouse NYC", "Lobby Hotel", "Terraza", "Oficina Pro", "París"] },
            { title: "5. Acción", key: "act", color: "c-v1", opts: ["Analizando", "Tomando Café", "Risa Natural", "Mirada Poder", "Grabando"] },
            { title: "6. Ángulo", key: "ang", color: "c-v2", opts: ["Primer Plano", "Plano Medio", "Ángulo Bajo", "Cenital", "Macro"] },
            { title: "7. Dispositivo", key: "len", color: "c-v3", opts: ["Shot on iPhone", "Portrait Mode", "85mm Pro", "35mm Street", "35mm Film"] },
            { title: "8. Iluminación", key: "lit", color: "c-v4", opts: ["Golden Hour", "Natural", "Studio", "Sombras", "Mañana"] },
            { title: "9. Branding", key: "col", color: "c-v1", opts: ["Neutros/Beige", "Blanco y Negro", "Tonos Tierra", "Azul y Oro", "Pasteles"] },
            { title: "10. Dirección", key: "sty", color: "c-v2", opts: ["UGC Style", "Editorial", "Cinematográfico", "Minimal", "Lifestyle"] }
        ];

        let state = {};
        const container = document.getElementById('accordion-container');

        config.forEach((group, i) => {
            const block = document.createElement('div');
            block.className = 'category-block';
            block.innerHTML = `
                <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                    ${group.title} <span>+</span>
                </div>
                <div class="category-content"></div>
            `;
            const grid = block.querySelector('.category-content');
            group.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `btn-option ${group.color}`;
                btn.innerText = opt;
                btn.onclick = () => {
                    grid.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state[group.key] = opt;
                    renderPrompt();
                };
                grid.appendChild(btn);
            });
            container.appendChild(block);
        });

        function renderPrompt() {
            const p = Object.values(state).join(", ");
            document.getElementById('result').innerText = p || "Diseña tu visión seleccionando botones...";
        }

        function copyPrompt(type) {
            const t = document.getElementById('result').innerText;
            if(t.includes("Diseña")) return alert("Selecciona opciones primero");
            let final = t;
            if(type === 'mj') final = `${t} --v 6.1 --ar 4:5 --stylize 250`;
            if(type === 'gpt') final = `A professional photograph of ${t}, luxury editorial style, 8k.`;
            if(type === 'higgs') final = `Cinematic movement, ${t}, 4k resolution.`;
            
            navigator.clipboard.writeText(final);
            alert(`Copiado para ${type.toUpperCase()}`);
        }

        function resetAll() {
            state = {};
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.category-block').forEach(c => c.classList.remove('active'));
            renderPrompt();
        }
    </script>
</body>
</html>
