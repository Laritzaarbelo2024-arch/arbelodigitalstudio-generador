
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital | Software</title>
    <style>
        :root {
            --fondo: #fba667; 
            --mint: #45c4a0;  
            --pink: #f26d7d;  
            --peach: #f39c12; 
            --lavender: #7487f1; 
            --marron-marca: #3d241e;
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 20px 0; }
        .header h1 {
            color: var(--marron-marca);
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .scroll-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-block {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .column-title {
            color: var(--marron-marca);
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-option {
            border: none;
            padding: 10px 2px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            color: white;
        }

        /* ESTADO ACTIVO: Cuando el botón está seleccionado */
        .btn-option.active { 
            outline: 3px solid var(--marron-marca); 
            transform: scale(0.92);
            box-shadow: none;
            filter: brightness(0.8);
        }

        .btn-pink { background: var(--pink); }
        .btn-mint { background: var(--mint); }
        .btn-lavender { background: var(--lavender); }
        .btn-peach { background: var(--peach); }

        /* AREA DE RESULTADOS FIJA */
        .prompt-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid var(--marron-marca);
            border-radius: 25px;
            padding: 15px;
            margin-top: 20px;
            position: sticky;
            bottom: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 100;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .lang-header {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-lang {
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            border: 2px solid var(--marron-marca);
            background: white;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--marron-marca);
        }

        .btn-lang.active { background: var(--marron-marca); color: white; }

        .display-area {
            background: #fff8f0;
            padding: 10px;
            border-radius: 12px;
            min-height: 35px;
            font-size: 0.75rem;
            color: #222;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .display-area.active-box { border: 2px solid var(--peach); background: #fffcf0; }

        .actions { display: flex; justify-content: center; gap: 5px; }
        
        .btn-action {
            padding: 10px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.65rem;
            flex: 1;
        }
        .btn-copy { background: #e67e22; }
        .btn-clear { background: #3498db; }
        .btn-others { background: #9b59b6; }

        .back-link { text-decoration: none; color: var(--marron-marca); font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>ARBELO DIGITAL</h1>
    </div>

    <div class="scroll-container">
        <div class="category-block">
            <div class="column-title">🌸 Nicho</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggleBtn(this, 'Business Mentor', 'Mentora de Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="toggleBtn(this, 'CEO Lifestyle', 'Estilo de vida CEO')">Lifestyle</button>
                <button class="btn-option btn-pink" onclick="toggleBtn(this, 'Skincare Luxe', 'Lujo Piel')">Belleza</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🎨 Material</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggleBtn(this, 'Silk texture', 'Textura de seda')">Seda</button>
                <button class="btn-option btn-mint" onclick="toggleBtn(this, 'Gold details', 'Detalles en oro')">Oro</button>
                <button class="btn-option btn-mint" onclick="toggleBtn(this, 'Marble surface', 'Superficie de mármol')">Mármol</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">💡 Iluminación</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="toggleBtn(this, 'Softbox lighting', 'Luz Suave')">Suave</button>
                <button class="btn-option btn-lavender" onclick="toggleBtn(this, 'Golden hour', 'Hora Dorada')">Golden</button>
                <button class="btn-option btn-lavender" onclick="toggleBtn(this, 'Studio light', 'Luz de Estudio')">Estudio</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">👗 Estilo Social</div>
            <div class="options-grid">
                <button class="btn-option btn-peach" onclick="toggleBtn(this, 'Old Money aesthetic', 'Estilo Old Money')">Old Money</button>
                <button class="btn-option btn-peach" onclick="toggleBtn(this, 'Minimalist chic', 'Minimalista Chic')">Minimal</button>
                <button class="btn-option btn-peach" onclick="toggleBtn(this, 'Boss Lady', 'Mujer Empoderada')">Ejecutiva</button>
            </div>
        </div>

        <div class="prompt-box">
            <div class="lang-header">
                <button id="btn-en" class="btn-lang active" onclick="setCopyLang('en')">🇺🇸 INGLÉS</button>
                <button id="btn-es" class="btn-lang" onclick="setCopyLang('es')">🇪🇸 ESPAÑOL</button>
            </div>

            <div style="font-size: 0.6rem; font-weight: bold; color: #888; margin-bottom: 3px;">🇺🇸 PROMPT (EN):</div>
            <div id="result-en" class="display-area active-box">Waiting...</div>

            <div style="font-size: 0.6rem; font-weight: bold; color: #888; margin-bottom: 3px;">🇪🇸 GUÍA (ES):</div>
            <div id="result-es" class="display-area">Esperando...</div>

            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyResult()">♥ COPIAR</button>
                <button class="btn-action btn-others" onclick="toggleOthers()">OTROS IA</button>
                <button class="btn-action btn-clear" onclick="clearAll()">BORRAR</button>
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <script>
        let selectedEN = [];
        let selectedES = [];
        let othersExtraEN = "";
        let othersExtraES = "";
        let activeCopyLang = 'en';

        function toggleBtn(btn, en, es) {
            btn.classList.toggle('active');
            if (selectedEN.includes(en)) {
                selectedEN = selectedEN.filter(i => i !== en);
                selectedES = selectedES.filter(i => i !== es);
            } else {
                selectedEN.push(en);
                selectedES.push(es);
            }
            render();
        }

        function setCopyLang(lang) {
            activeCopyLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('result-en').classList.toggle('active-box', lang === 'en');
            document.getElementById('result-es').classList.toggle('active-box', lang === 'es');
        }

        function toggleOthers() {
            if (othersExtraEN === "") {
                othersExtraEN = ", photorealistic, 8k, highly detailed";
                othersExtraES = ", fotorealista, 8k, muy detallado";
            } else {
                othersExtraEN = ""; othersExtraES = "";
            }
            render();
        }

        function render() {
            const resEN = document.getElementById('result-en');
            const resES = document.getElementById('result-es');
            
            let textEN = selectedEN.join(", ") + othersExtraEN;
            let textES = selectedES.join(", ") + othersExtraES;

            resEN.innerText = textEN.length > 0 ? textEN : "Waiting for selection...";
            resES.innerText = textES.length > 0 ? textES : "Esperando selección...";
        }

        function clearAll() {
            selectedEN = []; selectedES = []; othersExtraEN = ""; othersExtraES = "";
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            render();
        }

        function copyResult() {
            const targetId = activeCopyLang === 'en' ? 'result-en' : 'result-es';
            const text = document.getElementById(targetId).innerText;
            navigator.clipboard.writeText(text);
            alert("♥ Copiado en " + (activeCopyLang === 'en' ? "Inglés" : "Español"));
        }
    </script>
</body>
</html>
