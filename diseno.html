<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital Studio | Luxe Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #ffdae9; --teal: #e0f2f1; --gold: #d4af37; 
            --text: #5d4037; --white: #ffffff; --accent: #ff8a80;
        }
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: #fffaf0; color: var(--text); overflow: hidden; }

        /* Sidebar Estética */
        .sidebar { width: 280px; background: var(--teal); padding: 40px 20px; display: flex; flex-direction: column; border-right: 5px solid var(--white); transition: 0.3s; z-index: 2000; }
        .logo-area h1 { font-size: 1.8rem; color: #00796b; margin: 0; text-align: center; font-weight: 700; }
        .logo-area p { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-bottom: 40px; color: #4db6ac; }
        
        .nav-link { background: var(--white); border: none; color: #00796b; padding: 15px; text-align: left; cursor: pointer; font-size: 0.85rem; font-weight: 700; border-radius: 20px; margin-bottom: 10px; transition: 0.3s; box-shadow: 0 4px 0px rgba(0,0,0,0.05); }
        .nav-link.active { background: var(--pink); color: #c2185b; transform: scale(1.05); box-shadow: 0 6px 15px rgba(194,24,91,0.1); }

        /* Workspace */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .section-header { font-size: 1.4rem; font-weight: 700; color: #00796b; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .section-header::before { content: '✨'; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 150px; }
        
        /* Tarjetas y Botones Estilo "Caramelo" */
        .card { background: var(--white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 2px solid var(--teal); }
        .card h3 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { 
            background: #fff; border: 2px solid var(--teal); padding: 12px; border-radius: 20px; 
            cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: 0.3s; color: #00796b;
            box-shadow: 0 4px 0 var(--teal);
        }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }
        .opt-btn.active { background: var(--pink); border-color: #f8bbd0; color: #c2185b; box-shadow: 0 4px 0 #f8bbd0; }

        /* Consola Flotante Mágica */
        .output-panel { position: fixed; bottom: 20px; left: 300px; right: 20px; background: var(--white); border-radius: 30px; padding: 25px; border: 3px solid var(--pink); box-shadow: 0 15px 40px rgba(0,0,0,0.08); z-index: 1500; }
        .prompt-box { color: #5d4037; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; border-bottom: 2px dashed var(--pink); padding-bottom: 15px; min-height: 40px; }
        
        .app-connect { display: flex; gap: 10px; overflow-x: auto; }
        .app-btn { padding: 12px 20px; border: none; border-radius: 20px; color: white; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .app-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Responsivo */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; }
            .output-panel { left: 20px; }
            .btn-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <h1>ARBELO</h1>
            <p>Digital Studio ✨</p>
        </div>
        <button class="nav-link active" onclick="showView(this, 'view-marca')">🌸 Persona & Autoridad</button>
        <button class="nav-link" onclick="showView(this, 'view-ecommerce')">🛍️ E-commerce & Mockups</button>
        <button class="nav-link" onclick="showView(this, 'view-video')">🎬 Video & 3D Pixar</button>
    </div>

    <div class="main-content">
        <div id="view-marca" class="view-content active" style="display:block;">
            <div class="section-header">Esencia de Marca</div>
            <div class="grid-container">
                <div class="card">
                    <h3>ADN Visual</h3>
                    <div class="btn-group">
                        <button class="opt-btn" onclick="toggle(this)">Old Money 💎</button>
                        <button class="opt-btn" onclick="toggle(this)">Modern Luxe ✨</button>
                        <button class="opt-btn" onclick="toggle(this)">Barbie Luxe 🎀</button>
                    </div>
                </div>
                <div class="card">
                    <h3>Identidad Pro</h3>
                    <div class="btn-group">
                        <button class="opt-btn" onclick="toggle(this)">Pelo Rizo 🌀</button>
                        <button class="opt-btn" onclick="toggle(this)">Moño Pulido 👱‍♀️</button>
                        <button class="opt-btn" onclick="toggle(this)">Ondas al Agua 🌊</button>
                    </div>
                </div>
            </div>
        </div>
        </div>

    <div class="output-panel">
        <div id="prompt-output" class="prompt-box">Selecciona tu magia visual...</div>
        <div class="app-connect">
            <button class="app-btn" style="background:#4db6ac" onclick="copy('Freepik')">Freepik</button>
            <button class="app-btn" style="background:#ff8a80" onclick="copy('Higgsfield')">Higgsfield</button>
            <button class="app-btn" style="background:#81d4fa" onclick="copy('Dalle')">DALL-E 3</button>
            <button class="app-btn" style="background:#ce93d8" onclick="copy('Gemini')">Gemini</button>
        </div>
    </div>

    <script>
        let selections = new Set();
        function toggle(btn) {
            btn.classList.toggle('active');
            if(btn.classList.contains('active')) selections.add(btn.innerText);
            else selections.delete(btn.innerText);
            document.getElementById('prompt-output').innerText = Array.from(selections).join(", ") || "Selecciona tu magia visual...";
        }
        function copy(app) {
            const t = document.getElementById('prompt-output').innerText;
            navigator.clipboard.writeText(`[ARBELO ${app.toUpperCase()}]: ${t}`);
            alert("✨ ¡Copiado con éxito para " + app + "!");
        }
    </script>
</body>
</html>
