<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT OS FULL ENGINE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f14;
    color:#fff;
}

header{
    padding:18px;
    text-align:center;
    background:#1a1a24;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:10px;
    padding:10px;
}

.block{
    background:#1c1c2a;
    padding:10px;
    border-radius:10px;
}

h3{
    margin:0 0 8px 0;
    color:#8bd3ff;
    font-size:13px;
}

button{
    margin:3px;
    padding:6px 8px;
    border:none;
    border-radius:6px;
    font-size:11px;
    cursor:pointer;
    background:#2d6cdf;
    color:#fff;
}

button:hover{
    background:#4a8bff;
}

textarea{
    width:100%;
    height:70px;
    background:#12121a;
    border:1px solid #2a2a3a;
    color:white;
    border-radius:8px;
    padding:8px;
}

.output{
    margin:10px;
    padding:12px;
    background:#12121a;
    border-radius:10px;
    white-space:pre-wrap;
    border:1px solid #2a2a3a;
}

.actions{
    display:flex;
    gap:10px;
    padding:10px;
}

.actions button{
    flex:1;
    padding:10px;
}
</style>
</head>

<body>

<header>PROMPT OS — FULL VISUAL ENGINE</header>

<!-- INPUT -->
<div class="block" style="margin:10px;">
<h3>🧠 Input base</h3>
<textarea id="input" placeholder="Describe la idea principal..."></textarea>
</div>

<div class="container">

<!-- SCENE -->
<div class="block">
<h3>🎬 Scene</h3>
<button onclick="add('urban scene with movement')">Urbana</button>
<button onclick="add('studio controlled lighting scene')">Estudio</button>
<button onclick="add('natural outdoor adventure scene')">Natural</button>
<button onclick="add('commercial product focused scene')">Producto</button>
</div>

<!-- SUBJECT -->
<div class="block">
<h3>🧍 Subject</h3>
<button onclick="add('curvy woman defined facial structure realistic skin')">Mujer</button>
<button onclick="add('male athletic model cinematic look')">Hombre</button>
<button onclick="add('fashion influencer lifestyle look')">Influencer</button>
</div>

<!-- SHOT -->
<div class="block">
<h3>📷 Shot</h3>
<button onclick="add('full body shot')">Full Body</button>
<button onclick="add('medium shot')">Medium</button>
<button onclick="add('close up')">Close Up</button>
<button onclick="add('long shot')">Long</button>
</div>

<!-- ANGLE -->
<div class="block">
<h3>📐 Angle</h3>
<button onclick="add('eye level shot')">Eye Level</button>
<button onclick="add('low angle shot')">Low</button>
<button onclick="add('high angle shot')">High</button>
<button onclick="add('dutch angle shot')">Dutch</button>
</div>

<!-- MOTION -->
<div class="block">
<h3>🎥 Motion</h3>
<button onclick="add('tracking shot')">Tracking</button>
<button onclick="add('dolly in movement')">Dolly In</button>
<button onclick="add('orbit shot around subject')">Orbit</button>
<button onclick="add('static cinematic frame')">Static</button>
</div>

<!-- COMPOSITION -->
<div class="block">
<h3>🧭 Composition</h3>
<button onclick="add('centered composition')">Centered</button>
<button onclick="add('symmetrical composition')">Symmetry</button>
<button onclick="add('POV shot perspective')">POV</button>
<button onclick="add('forced perspective illusion')">Forced</button>
</div>

<!-- LIGHT -->
<div class="block">
<h3>💡 Lighting</h3>
<button onclick="add('golden hour natural sunlight')">Golden Hour</button>
<button onclick="add('soft studio lighting setup')">Studio</button>
<button onclick="add('backlit silhouette lighting')">Backlight</button>
<button onclick="add('volumetric cinematic lighting')">Volumetric</button>
</div>

<!-- STYLE -->
<div class="block">
<h3>🎨 Style</h3>
<button onclick="add('ultra-realistic cinematic photography')">Real</button>
<button onclick="add('anime style illustration')">Anime</button>
<button onclick="add('pixar style 3D render cinematic')">Pixar</button>
</div>

<!-- QUALITY -->
<div class="block">
<h3>🔥 Quality</h3>
<button onclick="add('hyper-detailed textures')">Detail</button>
<button onclick="add('8k resolution')">8K</button>
<button onclick="add('cinematic motion blur')">Motion Blur</button>
<button onclick="add('professional advertising photography')">Ads</button>
</div>

<!-- NEGATIVE -->
<div class="block">
<h3>🚫 Negative</h3>
<button onclick="add('no plastic skin')">No Plastic</button>
<button onclick="add('no distortion')">No Distortion</button>
<button onclick="add('no low quality')">No Low Quality</button>
<button onclick="add('no artificial look')">No AI Look</button>
</div>

</div>

<!-- ACTIONS -->
<div class="actions">
<button onclick="generate()">GENERAR PROMPT FINAL</button>
<button onclick="reset()">RESET</button>
</div>

<!-- OUTPUT -->
<div class="output" id="output">Output aparecerá aquí...</div>

<script>

let parts = [];

function add(text){
    parts.push(text);
    document.getElementById("output").innerText = parts.join(", ");
}

function generate(){

    const input = document.getElementById("input").value;

    let scene = [];
    let subject = [];
    let camera = [];
    let lighting = [];
    let style = [];
    let quality = [];
    let negative = [];

    // clasificación simple por keywords
    parts.forEach(p => {
        if(p.includes("scene")) scene.push(p);
        else if(p.includes("woman") || p.includes("man") || p.includes("model") || p.includes("influencer")) subject.push(p);
        else if(p.includes("shot") || p.includes("POV") || p.includes("composition") || p.includes("perspective")) camera.push(p);
        else if(p.includes("lighting") || p.includes("sunlight")) lighting.push(p);
        else if(p.includes("realistic") || p.includes("anime") || p.includes("pixar")) style.push(p);
        else if(p.includes("8k") || p.includes("hyper") || p.includes("cinematic")) quality.push(p);
        else if(p.includes("no")) negative.push(p);
    });

    let finalPrompt = "";

    if(input){
        finalPrompt += "MAIN IDEA: " + input + "\n\n";
    }

    finalPrompt += "PROMPT STRUCTURE:\n\n";

    finalPrompt += "Scene: " + scene.join(", ") + "\n";
    finalPrompt += "Subject: " + subject.join(", ") + "\n";
    finalPrompt += "Camera: " + camera.join(", ") + "\n";
    finalPrompt += "Lighting: " + lighting.join(", ") + "\n";
    finalPrompt += "Style: " + style.join(", ") + "\n";
    finalPrompt += "Quality: " + quality.join(", ") + "\n";
    finalPrompt += "Negative: " + negative.join(", ") + "\n";

    finalPrompt += "\nFINAL PROMPT:\n";
    finalPrompt += parts.join(", ");

    document.getElementById("output").innerText = finalPrompt;
}

function reset(){
    parts = [];
    document.getElementById("output").innerText = "";
    document.getElementById("input").value = "";
}

</script>

</body>
</html>
