<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Vision Studio | Consola Maestra Recuperada</title>
    <style>
        :root { --verde: #2d5a27; --crema: #f4f9f1; --oro: #c5a059; --oscuro: #1a1a1a; --gpt: #10a37f; }
        body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--oscuro); margin:0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-top: 15px solid var(--verde); text-align: center; margin-bottom: 120px; }
        h1 { color: var(--verde); margin-bottom: 5px; font-size: 2.2rem; }
        .subtitle { font-size: 0.8rem; color: #999; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
        .section-title { background: #eee; color: #666; padding: 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; margin-top: 30px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .category { margin-bottom: 10px; border: 1px solid #eee; border-radius: 15px; overflow: hidden; text-align: left; }
        .category-header { background: #fff; padding: 15px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.9rem; color: var(--verde); }
        .category-content { display: none; padding: 20px; background: #fafafa; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; border-top: 1px solid #eee; }
        .category.active .category-content { display: grid; }
        .option-btn { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.7rem; transition: 0.2s; color: #555; }
        .option-btn.active { background: var(--verde); color: white; border-color: var(--verde); font-weight: 700; }
        .result-area { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); max-width: 860px; width: 90%; background: var(--oscuro); color: #eee; padding: 20px 25px; border-radius: 25px; text-align: left; z-index: 1000; border: 2px solid var(--oro); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .prompt-text { font-family: 'Courier New', monospace; font-size: 0.8rem; display: block; color: #90ee90; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .copy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-ia { padding: 10px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.6rem; text-transform: uppercase; color: white; transition: 0.3s; }
        .btn-reset { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>Arbelo Vision Studio</h1>
    <div class="subtitle">Consola Maestra de Ingeniería Total</div>

    <div id="master-accordion"></div>
</div>

<div class="result-area">
    <span style="color:var(--oro); font-size:0.65rem; font-weight:900;">CONFIGURACIÓN VISUAL MAESTRA:</span>
    <span id="display-prompt" class="prompt-text">Armando tu visión con coherencia estratégica...</span>
    
    <div class="copy-grid">
        <button class="btn-ia" style="background:var(--verde)" onclick="copyMJ()">Midjourney</button>
        <button class="btn-ia" style="background:var(--gpt)" onclick="copyGPT()">ChatGPT</button>
        <button class="btn-ia btn-reset" onclick="resetAll()">Limpiar Todo</button>
    </div>
</div>

<script>
    const sections = [
        { label: "BLOQUE 0: ADN DE MARCA & NEGOCIOS", cats: [
            { title: "Nicho de Servicio", key: "biz", opts: ["Marketing Digital", "Real Estate", "Salud/Bienestar", "Finanzas", "Estética Pro", "Consultoría"] },
            { title: "Identidad & Edad", key: "idn", opts: ["Mujer Latina", "Elegancia Europea", "25-35 años", "35-45 años", "45-55 años"] },
            { title: "Paleta Branding", key: "col", opts: ["Old Money", "Poder", "Barbie Core", "Pure White", "Luxury Noir"] }
        ]},
        { label: "BLOQUE 1: PERSONAJE & CABELLO", cats: [
            { title: "Arquetipo", key: "sub", opts: ["CEO Visionaria", "Mentora Zen", "Influencer de Lujo", "Líder Inspiradora"] },
            { title: "Tipo de Cabello", key: "ht", opts: ["Pelo Rizo", "Pelo Ondulado", "Pelo Liso", "Afro Chic"] },
            { title: "Color Cabello", key: "hc", opts: ["Rubio Platino", "Rojo Vibrante", "Negro Azabache", "Balayage"] }
        ]},
        { label: "BLOQUE 2: MAQUILLAJE & SKINCARE", cats: [
            { title: "Maquillaje", key: "mk", opts: ["No-Makeup Look", "Labios Rojos", "Mate Editorial", "Piel Glowy"] },
            { title: "Textura Piel", key: "sk", opts: ["Poros Reales", "Satinada", "Vidrio", "Pecas Sutiles"] }
        ]},
        { label: "BLOQUE 3: ATUENDO & CALZADO", cats: [
            { title: "Vestimenta", key: "out", opts: ["Total White Look", "Blazer Sastre", "Seda Italiana", "Estilo Old Money"] },
            { title: "Zapato", key: "st", opts: ["Stilettos (Tacón)", "Mocasines Lujo", "Botas de Piel", "Sandalias Joya"] }
        ]},
        { label: "BLOQUE 4: ESCENA, LUZ & MOTOR VISUAL", cats: [
            { title: "Ubicación", key: "env", opts: ["Calle de París", "Penthouse NYC", "Terraza Mediterráneo", "Oficina High-Tech"] },
            { title: "Acción & Objetos", key: "act", opts: ["Mirada de Poder", "Tomando Café", "Analizando Datos", "iPhone 15 Pro"] },
            { title: "Motor Visual", key: "mot", opts: ["Fotografía Realista", "3D Animación Lujo", "Acabado Mate (Clay)"] }
        ]}
    ];

    let selections = new Set();
    const main = document.getElementById('master-accordion');

    sections.forEach(sec => {
        const sTitle = document.createElement('div');
        sTitle.className = 'section-title';
        sTitle.innerText = sec.label;
        main.appendChild(sTitle);
        sec.cats.forEach(cat => {
            const cDiv = document.createElement('div');
            cDiv.className = 'category';
            cDiv.innerHTML = `<div class="category-header" onclick="this.parentElement.classList.toggle('active')">${cat.title} <span>+</span></div><div class="category-content"></div>`;
            main.appendChild(cDiv);
            const grid = cDiv.querySelector('.category-content');
            cat.opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => {
                    if (selections.has(opt)) { selections.delete(opt); b.classList.remove('active'); }
                    else { selections.add(opt); b.classList.add('active'); }
                    update();
                };
                grid.appendChild(b);
            });
        });
    });

    function update() {
        const p = Array.from(selections).join(", ");
        document.getElementById('display-prompt').innerText = p || "Armando tu visión estratégica...";
    }

    function copyMJ() {
        const t = document.getElementById('display-prompt').innerText;
        let p = `${t} --v 6.1 --ar 4:5 --stylize 250`;
        navigator.clipboard.writeText(p); alert("Midjourney Copiado");
    }

    function copyGPT() {
        navigator.clipboard.writeText(`Create a prompt based on these attributes: ${document.getElementById('display-prompt').innerText}`);
        alert("ChatGPT Copiado");
    }

    function resetAll() {
        selections.clear();
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        update();
    }
</script>
</body>
</html>
