
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Studio | Prompting Software</title>
    <style>
        :root {
            --fondo: #fff5e6;
            --mint: #b9e5d8;
            --pink: #ffcfd2;
            --peach: #fde4cf;
            --lavender: #cfd9fd;
            --texto-marron: #8c7d6b;
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            color: #e59a8d;
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #d1a18d;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* CONTENEDOR QUE SE DESLIZA */
        .scroll-container {
            width: 100%;
            max-width: 500px; /* Ancho ideal para lectura y móvil */
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .category-block {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 4px solid white;
        }

        .column-title {
            background: var(--mint);
            color: white;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos botones por fila */
            gap: 10px;
        }

        .btn-option {
            border: none;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .btn-option:active { transform: translateY(3px); box-shadow: none; }

        /* Colores exactos de tu imagen */
        .btn-pink { background: var(--pink); color: #d66d75; }
        .btn-mint { background: var(--mint); color: #5b8c7d; }
        .btn-lavender { background: var(--lavender); color: #7d8cc4; }
        .btn-peach { background: var(--peach); color: #c49c7d; }

        /* AREA DE RESULTADO (FIJA O AL FINAL) */
        .prompt-box {
            background: #fff;
            border: 3px dashed #e5ccac;
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            width: 100%;
            max-width: 460px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-copy { background: #f08a70; }
        .btn-clear { background: #8ba3f0; }

        .back-link {
            margin-bottom: 20px;
            text-decoration: none;
            color: #d1a18d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Volver al Menú</a>

    <div class="header">
        <h1>Arbelo DIGITAL STUDIO</h1>
        <p>PROMPTING SOFTWARE FOR MENTORS</p>
    </div>

    <div class="scroll-container">
        
        <div class="category-block">
            <div class="column-title" style="background: var(--pink);">Categoría</div>
            <div class="options-grid">
                <button class="btn-option btn-pink">Negocios 🌸</button>
                <button class="btn-option btn-pink">Old Money 💎</button>
                <button class="btn-option btn-pink">Servicios 🌷</button>
                <button class="btn-option btn-pink">Lifestyle ✨</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title" style="background: var(--mint);">Material</div>
            <div class="options-grid">
                <button class="btn-option btn-mint">Color 🎨</button>
                <button class="btn-option btn-mint">Brillo ✨</button>
                <button class="btn-option btn-mint">Mate ☁️</button>
                <button class="btn-option btn-mint">Vidrio 🔮</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title" style="background: var(--lavender);">Iluminación</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender">Suave ☁️</button>
                <button class="btn-option btn-lavender">Estudio 💡</button>
                <button class="btn-option btn-lavender">Natural ☀️</button>
                <button class="btn-option btn-lavender">Golden Hour 🌅</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title" style="background: var(--peach);">Estilo Render</div>
            <div class="options-grid">
                <button class="btn-option btn-peach">Editorial</button>
                <button class="btn-option btn-peach">High-End</button>
                <button class="btn-option btn-peach">Minimal</button>
                <button class="btn-option btn-peach">Realista</button>
            </div>
        </div>

        <div class="prompt-box">
            <p style="color: var(--texto-marron); font-weight: bold;">Tu Prompt Resultante:</p>
            <div id="result" style="color: #aaa; font-style: italic;">Selecciona opciones arriba...</div>
            <div class="actions">
                <button class="btn-action btn-copy">♥ Copiar</button>
                <button class="btn-action btn-clear">Limpiar 🪶</button>
            </div>
        </div>

        <div style="height: 50px;"></div> </div>

</body>
</html>
