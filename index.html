<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Arbelo Digital</title>
    <style>
        :root { --rosa: #f06292; --fondo: #fdf6f9; }
        body { font-family: Arial; background: var(--fondo); text-align: center; padding: 20px; }
        .card { background: white; border-radius: 25px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-tag { background: #fce4ec; border: none; padding: 10px; border-radius: 15px; margin: 5px; cursor: pointer; }
        .btn-tag.active { background: var(--rosa); color: white; }
        .btn-main { background: var(--rosa); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        #resultado { margin-top: 20px; padding: 15px; background: #fff3f8; border: 2px dashed var(--rosa); border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Creador de Sugerencias ✨</h1>
        <p>Selecciona las opciones para tu prompt</p>
        
        <div id="secciones">
            <p><strong>Producto:</strong></p>
            <button class="btn-tag" onclick="sel(this, 'Cuaderno')">Cuaderno</button>
            <button class="btn-tag" onclick="sel(this, 'Camiseta')">Camiseta</button>
            
            <p><strong>Estilo:</strong></p>
            <button class="btn-tag" onclick="sel(this, 'Acuarela')">Acuarela</button>
            <button class="btn-tag" onclick="sel(this, 'Kawaii')">Kawaii</button>
        </div>

        <button class="btn-main" onclick="generar()">GENERAR INSTRUCCIÓN</button>
        <div id="resultado" onclick="copiar()"><strong>Haz clic aquí para copiar:</strong><br><span id="txt"></span></div>
    </div>

    <script>
        let selecciones = [];
        function sel(btn, valor) {
            btn.classList.toggle('active');
            if(btn.classList.contains('active')) selecciones.push(valor);
            else selecciones = selecciones.filter(v => v !== valor);
        }
        function generar() {
            document.getElementById('txt').innerText = selecciones.join(", ") + ", alta calidad, 8k.";
            document.getElementById('resultado').style.display = 'block';
        }
        function copiar() {
            navigator.clipboard.writeText(document.getElementById('txt').innerText);
            alert("¡Copiado! 📋");
        }
    </script>
</body>
</html>
