<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt OS Commercial Engine</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6fb;
color:#111;
}

header{
text-align:center;
padding:18px;
font-weight:800;
background:white;
border-bottom:1px solid #eee;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:14px;
}

.block{
background:white;
border-radius:16px;
padding:12px;
box-shadow:0 8px 22px rgba(0,0,0,0.06);
}

h3{
font-size:12px;
margin:0 0 10px 0;
color:#6d28d9;
}

button{
margin:4px;
padding:8px 10px;
border:none;
border-radius:999px;
font-size:11px;
font-weight:600;
cursor:pointer;
color:white;
}

.scene{background:#ff5c7a;}
.subject{background:#7c3aed;}
.camera{background:#06b6d4;}
.light{background:#f59e0b;}
.style{background:#ec4899;}
.quality{background:#3b82f6;}
.story{background:#10b981;}
.action{background:#ef4444;}

.output{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:14px;
}

.box{
background:white;
padding:14px;
border-radius:16px;
min-height:180px;
white-space:pre-wrap;
border:1px solid #eee;
}

.actions{
display:flex;
gap:10px;
padding:14px;
}

.primary{
flex:1;
background:#6366f1;
color:white;
border:none;
padding:12px;
border-radius:12px;
font-weight:700;
}

.secondary{
flex:1;
background:#111;
color:white;
border:none;
padding:12px;
border-radius:12px;
font-weight:700;
}
</style>
</head>

<body>

<header>PROMPT OS — COMMERCIAL ENGINE</header>

<div class="container">

<!-- BASE -->
<div class="block">
<h3>⚙️ BASE</h3>
<button class="scene" onclick="add('base','ultra realistic cinematic advertising photography')">Base Pro</button>
</div>

<!-- SUJETO -->
<div class="block">
<h3>🧍 SUJETO</h3>
<button class="subject" onclick="add('subject','curvy woman defined facial structure editorial skin')">Mujer</button>
<button class="subject" onclick="add('subject','athletic male cinematic strong physique')">Hombre</button>
<button class="subject" onclick="add('subject','luxury influencer high fashion aesthetic')">Influencer</button>
<button class="subject" onclick="add('subject','premium product hero shot centered')">Producto</button>
</div>

<!-- ACCIÓN -->
<div class="block">
<h3>🎬 ACCIÓN</h3>
<button class="action" onclick="add('action','walking with cinematic motion')">Caminar</button>
<button class="action" onclick="add('action','posing for luxury advertising shot')">Posar</button>
<button class="action" onclick="add('action','interaction with environment natural movement')">Interactuar</button>
</div>

<!-- ESCENA -->
<div class="block">
<h3>🌍 ESCENA</h3>
<button class="scene" onclick="add('scene','urban neon city night environment')">Urbana</button>
<button class="scene" onclick="add('scene','tropical beach sunset cinematic mood')">Playa</button>
<button class="scene" onclick="add('scene','luxury studio clean background lighting')">Studio</button>
<button class="scene" onclick="add('scene','cyberpunk futuristic city environment')">Cyberpunk</button>
</div>

<!-- CÁMARA -->
<div class="block">
<h3>📷 CÁMARA</h3>
<button class="camera" onclick="add('camera','35mm cinematic lens shallow depth')">35mm</button>
<button class="camera" onclick="add('camera','85mm portrait lens bokeh depth')">85mm</button>
<button class="camera" onclick="add('camera','low angle dramatic shot')">Low</button>
<button class="camera" onclick="add('camera','POV immersive perspective')">POV</button>
</div>

<!-- LUZ -->
<div class="block">
<h3>💡 LUZ</h3>
<button class="light" onclick="add('light','golden hour natural sunlight cinematic glow')">Golden</button>
<button class="light" onclick="add('light','soft studio diffused lighting')">Studio</button>
<button class="light" onclick="add('light','volumetric cinematic shadows')">Volumétrico</button>
</div>

<!-- ESTILO -->
<div class="block">
<h3>🎨 ESTILO</h3>
<button class="style" onclick="add('style','ultra realistic advertising photography')">Real</button>
<button class="style" onclick="add('style','anime cinematic illustration style')">Anime</button>
<button class="style" onclick="add('style','pixar 3d cinematic render')">Pixar</button>
</div>

<!-- CALIDAD -->
<div class="block">
<h3>🔥 CALIDAD</h3>
<button class="quality" onclick="add('quality','8k ultra detailed hyper realistic')">8K</button>
<button class="quality" onclick="add('quality','iphone latest generation capture')">iPhone</button>
</div>

<!-- STORY -->
<div class="block">
<h3>🌍 NARRATIVA</h3>
<button class="story" onclick="add('story','adventure freedom lifestyle energy')">Aventura</button>
<button class="story" onclick="add('story','luxury premium exclusivity mood')">Lujo</button>
<button class="story" onclick="add('story','viral social media hook marketing')">Viral</button>
</div>

</div>

<!-- OUTPUT -->
<div class="output">

<div class="box">
🇪🇸 ESPAÑOL
<div id="es"></div>
</div>

<div class="box">
🇺🇸 ENGLISH
<div id="en"></div>
</div>

</div>

<div class="actions">
<button class="primary" onclick="generate()">GENERAR PROMPT</button>
<button class="secondary" onclick="copyPrompt()">COPIAR</button>
</div>

<script>

let engine = {
base:[],
subject:[],
action:[],
scene:[],
camera:[],
light:[],
style:[],
quality:[],
story:[]
};

function add(type,value){
engine[type].push(value);
generate();
}

function build(){
return [
...engine.base,
...engine.subject,
...engine.action,
...engine.scene,
...engine.camera,
...engine.light,
...engine.style,
...engine.quality,
...engine.story
];
}

function generate(){

let prompt = build().join(", ");

document.getElementById("es").innerText =
prompt + ", composición cinematográfica optimizada para marketing visual";

document.getElementById("en").innerText =
prompt + ", cinematic advertising composition, high-end commercial output";
}

function copyPrompt(){
let text =
"ES:\n" + document.getElementById("es").innerText +
"\n\nEN:\n" + document.getElementById("en").innerText;

navigator.clipboard.writeText(text);
alert("Prompt copiado");
}

</script>

</body>
</html>
