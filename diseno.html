<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbelo Digital Prompt Generator</title>

<style>
:root {
    --fondo: #fba667; 
    --mint: #45c4a0;  
    --pink: #f26d7d;  
    --peach: #f39c12; 
    --lavender: #7487f1; 
    --marron-marca: #3d241e; 
}

body {
    margin: 0;
    padding: 10px;
    background: var(--fondo);
    font-family: Verdana, sans-serif;
}

/* ===== LAYOUT GENERAL ===== */
.layout {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
}

/* ===== BLOQUES ===== */
.scroll-container {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.category-block {
    background: white;
    padding: 12px;
    border-radius: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.column-title {
    text-align: center;
    font-size: 0.75rem;
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--marron-marca);
    text-transform: uppercase;
}

.options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
}

.btn-option {
    border: none;
    padding: 8px;
    border-radius: 12px;
    font-size: 0.65rem;
    font-weight: bold;
    cursor: pointer;
    color: white;
    transition: 0.2s;
}

.btn-option.active {
    outline: 3px solid var(--marron-marca);
    transform: scale(0.92);
    filter: brightness(0.8);
}

.btn-pink { background: var(--pink); }
.btn-mint { background: var(--mint); }

/* ===== PANEL FLOTANTE REAL ===== */
.prompt-box {
    position: sticky;
    top: 20px;

    width: 360px;
    max-width: 95%;

    background: rgba(255,255,255,0.96);
    border: 4px solid var(--marron-marca);
    border-radius: 35px;

    padding: 18px;

    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    z-index: 999;

    backdrop-filter: blur(10px);
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    .layout {
        flex-direction: column;
        align-items: center;
    }

    .prompt-box {
        position: fixed;
        bottom: 0;
        left: 0;

        width: 100%;
        max-width: 100%;

        border-radius: 25px 25px 0 0;
        top: auto;
    }
}

/* ===== LANG ===== */
.lang-header {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.btn-lang {
    flex: 1;
    padding: 7px;
    border-radius: 12px;
    border: 2px solid var(--marron-marca);
    background: white;
    font-weight: bold;
    cursor: pointer;
}

.btn-lang.active {
    background: var(--marron-marca);
    color: white;
}

/* ===== OUTPUT ===== */
.display-area {
    background: #fff;
    padding: 10px;
    border-radius: 15px;
    min-height: 40px;
    font-size: 0.75rem;
    margin-bottom: 10px;
}

.display-area.active-box {
    border: 2px solid var(--mint);
}

/* ===== ACTIONS ===== */
.actions {
    display: flex;
    gap: 8px;
}

.btn-action {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 18px;
    font-weight: bold;
    color: white;
    cursor: pointer;
}

.btn-copy { background: var(--marron-marca); }
.btn-clear { background: #e74c3c; }

</style>
</head>

<body>

<div class="layout">

    <!-- ===== BLOQUES ===== -->
    <div class="scroll-container">

        <div class="category-block">
            <div class="column-title">🎬 SUJETO</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this,'Editorial woman','Mujer editorial')">Editorial</button>
                <button class="btn-option btn-pink" onclick="toggle(this,'UGC lifestyle','UGC lifestyle')">UGC</button>
                <button class="btn-option btn-pink" onclick="toggle(this,'Product shot','Producto')">Producto</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🌸 NICHO</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggle(this,'Marketing AI','Marketing IA')">Marketing</button>
                <button class="btn-option btn-mint" onclick="toggle(this,'Beauty skincare','Belleza')">Beauty</button>
                <button class="btn-option btn-mint" onclick="toggle(this,'Real estate luxury','Realtor')">Realtor</button>
                <button class="btn-option btn-mint" onclick="toggle(this,'Health coach','Salud')">Salud</button>
                <button class="btn-option btn-mint" onclick="toggle(this,'Finance expert','Finanzas')">Finanzas</button>
                <button class="btn-option btn-mint" onclick="toggle(this,'Amazon influencer','Amazon')">Amazon</button>
            </div>
        </div>

    </div>

    <!-- ===== PANEL FLOTANTE ===== -->
    <div class="prompt-box">

        <div class="lang-header">
            <button id="enBtn" class="btn-lang active" onclick="setLang('en')">EN</button>
            <button id="esBtn" class="btn-lang" onclick="setLang('es')">ES</button>
        </div>

        <div id="result-en" class="display-area active-box">Waiting...</div>
        <div id="result-es" class="display-area">Esperando...</div>

        <div class="actions">
            <button class="btn-action btn-copy" onclick="copyText()">COPY</button>
            <button class="btn-action btn-clear" onclick="clearAll()">CLEAR</button>
        </div>

    </div>

</div>

<script>

let en = [];
let es = [];
let lang = "en";

function toggle(btn, enText, esText) {

    btn.classList.toggle("active");

    if (en.includes(enText)) {
        en = en.filter(i => i !== enText);
        es = es.filter(i => i !== esText);
    } else {
        en.push(enText);
        es.push(esText);
    }

    render();
}

function render() {
    document.getElementById("result-en").innerText =
        en.length ? en.join(", ") : "Waiting...";

    document.getElementById("result-es").innerText =
        es.length ? es.join(", ") : "Esperando...";
}

function setLang(l) {
    lang = l;
    document.getElementById("enBtn").classList.toggle("active", l==="en");
    document.getElementById("esBtn").classList.toggle("active", l==="es");
}

function copyText() {
    let text = lang === "en"
        ? document.getElementById("result-en").innerText
        : document.getElementById("result-es").innerText;

    navigator.clipboard.writeText(text);
    alert("Copiado");
}

function clearAll() {
    en = [];
    es = [];
    document.querySelectorAll(".btn-option").forEach(b => b.classList.remove("active"));
    render();
}

</script>

</body>
</html>
