<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laritza | AI Casting Studio</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00f3ff;
            --bg-dark: #050505;
            --card-bg: #121212;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--neon-green); text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid var(--neon-green); }

        .module {
            background: var(--card-bg);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            margin: 10px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        button {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8em;
        }

        button:hover { border-color: var(--neon-green); color: white; }

        button.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-green);
        }

        #prompt-box {
            position: sticky;
            bottom: 20px;
            width: 90%;
            max-width: 800px;
            background: #1a1a1a;
            border: 2px solid var(--neon-blue);
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            color: var(--neon-blue);
            border: none;
            resize: none;
            font-family: monospace;
            font-size: 14px;
        }

        .copy-btn {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

    <h1>AI Global Casting Studio</h1>

    <div class="module" id="mod-identity">
        <h3>👤 MÓDULO 1: ORIGEN (LA CUBANA #1)</h3>
        <div class="grid">
            <button onclick="setSubject('🇨🇺 Cubana', 'Stunning Cuban woman, warm golden undertones, authentic Caribbean features')">🇨🇺 Cubana</button>
            <button onclick="setSubject('🇩🇴 Dominicana', 'Radiant Dominican woman, deep honey skin, curly hair')">🇩🇴 Dominicana</button>
            <button onclick="setSubject('🇨🇴 Colombiana', 'Beautiful Colombian woman, long dark hair, expressive eyes')">🇨🇴 Colombiana</button>
            <button onclick="setSubject('🇯🇵 Japonesa', 'Modern Japanese woman, sleek black hair, porcelain skin')">🇯🇵 Japonesa</button>
            <button onclick="setSubject('🇮🇹 Italiana', 'Stunning Italian woman, Mediterranean features, wavy hair')">🇮🇹 Italiana</button>
        </div>
    </div>

    <div class="module" id="mod-skin">
        <h3>🧬 MÓDULO 2: ADN DE PIEL (MULTI-SELECT)</h3>
        <div class="grid">
            <button class="multi" onclick="toggleSkin('Poros', 'micro-detailed skin pores')">🧫 Poros Visibles</button>
            <button class="multi" onclick="toggleSkin('Luz', 'subsurface scattering, realistic skin translucency')">💡 Luz Orgánica</button>
            <button class="multi" onclick="toggleSkin('Sudor', 'natural skin sweat, hydrated glow')">🧴 Brillo/Sudor</button>
            <button class="multi" onclick="toggleSkin('Pecas', 'natural facial freckles')">🍓 Pecas</button>
        </div>
    </div>

    <div class="module" id="mod-outfit">
        <h3>🧥 MÓDULO 3: VESTUARIO</h3>
        <div class="grid">
            <button onclick="setOutfit('💼 Ejecutiva', 'wearing a sharp tailored business suit')">💼 Ejecutiva</button>
            <button onclick="setOutfit('👗 Vestido Seda', 'wearing a luxurious silk slip dress')">👗 Vestido Seda</button>
            <button onclick="setOutfit('🧘 Fitness', 'wearing high-waisted yoga leggings and sports bra')">🧘 Fitness</button>
            <button onclick="setOutfit('👙 Bikini', 'wearing a luxury designer bikini')">👙 Bikini</button>
        </div>
    </div>

    <div id="prompt-box">
        <textarea id="final-prompt" readonly>Selecciona opciones para generar tu prompt maestro...</textarea>
        <button class="copy-btn" onclick="copyPrompt()">COPIAR PROMPT</button>
    </div>

    <script>
        let selections = {
            subject: "",
            skin: [],
            outfit: ""
        };

        function setSubject(name, tech) {
            selections.subject = tech;
            updatePrompt();
            highlight(event.target);
        }

        function toggleSkin(name, tech) {
            const index = selections.skin.indexOf(tech);
            if (index > -1) {
                selections.skin.splice(index, 1);
                event.target.classList.remove('active');
            } else {
                selections.skin.push(tech);
                event.target.classList.add('active');
            }
            updatePrompt();
        }

        function setOutfit(name, tech) {
            selections.outfit = tech;
            updatePrompt();
            highlight(event.target);
        }

        function updatePrompt() {
            let skinText = selections.skin.length > 0 ? `, with ${selections.skin.join(', ')}` : "";
            let prompt = `${selections.subject}${skinText}, ${selections.outfit}, photorealistic, raw style, 8k --ar 9:16 --v 6.1`;
            document.getElementById('final-prompt').value = prompt;
        }

        function highlight(target) {
            let siblings = target.parentNode.querySelectorAll('button:not(.multi)');
            siblings.forEach(s => s.classList.remove('active'));
            target.classList.add('active');
        }

        function copyPrompt() {
            let copyText = document.getElementById("final-prompt");
            copyText.select();
            document.execCommand("copy");
            alert("Prompt copiado al portapapeles!");
        }
    </script>
</body>
</html>
