<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital Studio | Centro de Herramientas IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #2d5a27; --fondo: #f4f9f1; --blanco: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--fondo); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--blanco); padding: 3rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); max-width: 450px; text-align: center; border-top: 8px solid var(--verde); }
        h1 { color: var(--verde); margin-bottom: 5px; }
        .subtitle { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: #666; margin-bottom: 40px; }
        .btn-card { display: flex; align-items: center; text-decoration: none; background: #fff; border: 1px solid #eee; padding: 20px; margin-bottom: 15px; border-radius: 15px; transition: 0.3s; text-align: left; }
        .btn-card:hover { transform: translateY(-3px); border-color: var(--verde); box-shadow: 0 5px 15px rgba(45, 90, 39, 0.1); }
        .icon { font-size: 1.8rem; margin-right: 20px; }
        .info h3 { margin: 0; font-size: 1.1rem; color: var(--verde); }
        .info p { margin: 5px 0 0; font-size: 0.85rem; color: #777; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Arbelo Digital Studio</h1>
    <div class="subtitle">ESTRATEGIA, MARKETING & IA</div>

    <a href="diseno.html" class="btn-card">
        <span class="icon">🌿</span>
        <div class="info">
            <h3>Diseño Aesthetic & Canva</h3>
            <p>Prompts para imágenes de lujo y estilo editorial premium.</p>
        </div>
    </a>

    <div class="btn-card disabled">
        <span class="icon">📈</span>
        <div class="info"><h3>Generador de Contenido</h3><p>Próximamente...</p></div>
    </div>
</div>
</body>
</html>
