
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Creator Studio | Personajes & IA</title>
    <style>
        :root { 
            --verde: #2d5a27; --verde-os: #1e3d1a; --oro: #c5a059; --oscuro: #0d0624;
            --gpt: #10a37f; --google: #4285f4; --free: #00aaff; --higgs: #ff4d4d;
            --acento: #7c3aed; --rosa: #db2777;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #0d0624 0%, #07021a 100%); 
            color: #e9d5ff; margin:0; padding: 20px; display: flex; justify-content: center; 
        }

        .container { 
            max-width: 800px; width: 100%; background: #1a0940; padding: 30px; 
            border-radius: 40px; border-top: 10px solid var(--verde); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        h1 { color: #fde68a; font-size: 1.8rem; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a78bfa; margin-bottom: 30px; letter-spacing: 2px; }

        /* Estilo Secciones */
        .section-title { 
            font-size: 0.8rem; font-weight: 800; color: var(--oro); 
            text-transform: uppercase; margin: 25px 0 12px; border-bottom: 1px solid #3b0764; padding-bottom: 5px;
        }

        .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }

        /* BOTONES 3D PILL */
        .pill-btn {
            border-radius: 999px; border: 1.5px solid #3f2d5c; padding: 8px 16px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.1s;
            background: #1e1040; color: #a78bfa;
            border-bottom: 4px solid #000;
        }

        .pill-btn:hover { background: #2a165a; transform: translateY(-1px); }

        .pill-btn.active {
            background: linear-gradient(135deg, var(--acento), var(--rosa));
            color: white; border-color: #e879f9; border-bottom: 4px solid #5b21b6;
            box-shadow: 0 0 10px rgba(232, 121, 249, 0.4);
        }

        .pill-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

        /* Consola de Salida */
        .result-area { 
            margin-top: 40px; padding: 25px; background: var(--oscuro); 
            border-radius: 30px; border: 2px solid var(--acento); position: sticky; bottom: 20px;
        }

        .prompt-box { 
            font-family: 'Courier New', monospace; font-size: 0.85rem; color: #86efac; 
            background: #0a0520; padding: 15px; border-radius: 15px; min-height: 50px; margin-bottom: 20px;
        }

        .copy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        
        .btn-ia {
            border-radius: 999px; border: none; padding: 12px; font-weight: 800; font-size: 0.6rem;
            text-transform: uppercase; cursor: pointer; color: white; border-bottom: 4px solid rgba(0,0,0,0.3);
        }

        .btn-mj { background: var(--verde); } .btn-gpt { background: var(--gpt); }
        .btn-higgs { background: var(--higgs); } .btn-flow { background: var(--google); }
        .btn-free { background: var(--free); } .btn-reset { background: #444; }

        .btn-ia:active { transform: translateY(2px); border-bottom-width: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Arbelo Creator Studio</h1>
    <div class="subtitle">DISEÑO DE PERSONAJES & OUTFITS IA</div>

    <div id="ui-builder"></div>

    <div class="result-area">
        <div style="color: var(--oro); font-size: 0.7rem; font-weight: 900; margin-bottom: 10px;">PROMPT GENERADO:</div>
        <div id="final-prompt" class="prompt-box">Selecciona opciones para crear...</div>
        
        <div class="copy-grid">
            <button class="btn-ia btn-mj" onclick="copyPrompt('mj')">Midjourney</button>
            <button class="btn-ia btn-gpt" onclick="copyPrompt('gpt')">ChatGPT</button>
            <button class="btn-ia btn-higgs" onclick="copyPrompt('higgs')">Higgsfield</button>
            <button class="btn-ia btn-flow" onclick="copyPrompt('flow')">Google Flow</button>
            <button class="btn-ia btn-free" onclick="copyPrompt('free')">Freepik</button>
            <button class="btn-ia btn-reset" onclick="resetAll()">Limpiar</button>
        </div>
    </div>
</div>

<script>
    // Datos integrados de tu código React
    const SECTIONS = [
        { label: "Producto", key: "prod", opts: ["3D Render", "Cuaderno", "Coloring Page", "Camiseta"] },
        { label: "Estilo Visual", key: "style", opts: ["Chibi 3D Brillante", "Muñeca Hiperreal", "Render Octane", "Figura Vinilo", "Plastilina Suave"] },
        { label: "Personaje", key: "char", opts: ["Chica", "Chico", "Mujer", "Hombre", "Hada", "Sirena", "Unicornio", "Panda"] },
        { label: "Tono de Piel", key: "skin", opts: ["Latina Caramelo", "Asiática Porcelana", "Europea Clara", "Africana Melanin", "Árabe Dorada"] },
        { label: "Outfit Preset", key: "outfit", opts: ["Jefa Poderosa", "Diva Glam", "Estilo Urbano", "Kawaii Tierno", "Sporty Star"] },
        { label: "Calzado", key: "shoes", opts: ["Tenis Jordan", "Tacones Elegantes", "Botas Altas", "Mary Jane", "Pantuflas Peludas"] },
        { label: "Peinado", key: "hair", opts: ["Largo Liso", "Ondas Sueltas", "Afro Voluminoso", "Trenzas Box", "Space Buns"] },
        { label: "Pose", key: "pose", opts: ["Sassy Stand", "Saludando Feliz", "Beso Corazón", "Brazos Cruzados", "Sentada Barbilla"] },
        { label: "Fondo", key: "bg", opts: ["PNG Transparente", "Blanco Sólido", "Degradado Pastel", "Glitter Sparkling"] }
    ];

    let state = {};

    function init() {
        const builder = document.getElementById('ui-builder');
        SECTIONS.forEach(sec => {
            const title = document.createElement('div');
            title.className = 'section-title';
            title.innerText = sec.label;
            builder.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'chip-grid';
            sec.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'pill-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    grid.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state[sec.key] = opt;
                    update();
                };
                grid.appendChild(btn);
            });
            builder.appendChild(grid);
        });
    }

    function update() {
        const p = Object.values(state).join(", ");
        document.getElementById('final-prompt').innerText = p || "Selecciona opciones...";
    }

    function copyPrompt(type) {
        const text = document.getElementById('final-prompt').innerText;
        let final = text;
        if(type === 'mj') final = `${text} --v 6.1 --ar 4:5 --stylize 250`;
        if(type === 'gpt') final = `A high-end 3D character design of: ${text}. Editorial style, 8k.`;
        
        navigator.clipboard.writeText(final);
        alert(`✨ Prompt copiado para ${type.toUpperCase()}`);
    }

    function resetAll() {
        state = {};
        document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
        update();
    }

    init();
</script>
</body>
</html>
