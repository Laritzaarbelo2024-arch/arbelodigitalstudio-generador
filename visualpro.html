<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Visual Pro Alchemy — Arbelo Digital Studio</title>
  <style>
    :root {
      --bg-black: #070707;
      --fuchsia-neon: #f04eb1;
      --card-dusty: #c58989;
      --card-dusty-light: #d39b9b;
      --card-dusty-deep: #a86f6f;
      --gold-base: #bc914d;
      --gold-gradient: linear-gradient(135deg, #bc914d 0%, #ffd700 15%, #ffffff 50%, #ffd700 85%, #bc914d 100%);
      --pink-neon: #ff00e5;
      --purple-neon: #7a00ff;
      --emerald-neon: #00ff95;
      --blue-neon: #0047ff;
      --text-soft: #fff8fb;
      --text-ink: #5b4148;
      --placeholder-ink: #8d6a73;
      --active-glow: 0 0 0 3px rgba(255,255,255,0.88), 0 0 22px rgba(255,215,0,0.55);
      --panel-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 10px 18px rgba(0,0,0,0.16);

      /* Footer vars */
      --gold-main: #e0b968;
      --gold-soft: #f4de9d;
      --gold-deep: #c6912e;
      --gold-burnt: #8a5a17;
      --text-brown: #5b3a12;
      --footer-rose: #C58989;
      --footer-rose-light: #D39B9B;
      --footer-rose-dark: #A86F6F;
      --footer-rose-deep: #7B5656;
      --btn-green: #12f0a1;
      --btn-blue: #1fc8ff;
      --btn-gold: #ffd400;
      --btn-pink: #ff00c8;
      --btn-purple: #a21fff;
      --btn-red: #ff4638;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 34px 20px;
      background: var(--bg-black);
      color: var(--text-soft);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    button, input { font: inherit; }

    .header-nav {
      width: 100%;
      max-width: min(98%, 1200px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 22px;
      margin-bottom: 44px;
      padding: 10px 6px 8px;
    }

    .home-link {
      background: var(--gold-gradient);
      padding: 12px 25px;
      border-radius: 999px;
      text-decoration: none;
      color: #000;
      font-weight: 800;
      font-size: 0.84rem;
      white-space: nowrap;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      min-width: 260px;
      gap: 10px;
    }

    .brand-name {
      margin: 0;
      font-size: clamp(1.15rem, 2vw, 1.75rem);
      font-weight: 700;
      text-transform: uppercase;
      color: #DEBC61;
      text-shadow: 0 0 10px rgba(222,188,97,0.18);
    }

    .tool-name {
      margin: 0;
      font-size: clamp(0.88rem, 1.4vw, 1.18rem);
      font-weight: 700;
      text-transform: uppercase;
      color: #4EEDCA;
    }

    .lang-switcher {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 2px solid rgba(222,188,97,0.68);
      background: rgba(0,0,0,0.62);
      box-shadow: 0 0 18px rgba(0,71,255,0.22);
    }

    .lang-btn {
      position: relative;
      z-index: 1;
      min-width: 90px;
      border: 2px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-weight: 900;
      font-size: 0.71rem;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn.is-active {
      background: linear-gradient(135deg, rgba(0,71,255,0.95), rgba(122,0,255,0.92));
      border-color: #fff;
    }

    .app-viewport {
      width: 100%;
      max-width: min(98%, 1200px);
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .section-block {
      width: 100%;
      background: var(--fuchsia-neon);
      padding: 8px;
      border-radius: 80px;
    }

    .card-inner {
      background: linear-gradient(180deg, var(--card-dusty-light) 0%, var(--card-dusty) 44%, var(--card-dusty-deep) 100%);
      border: 4px solid var(--gold-base);
      border-radius: 72px;
      padding: 40px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: var(--panel-shadow);
    }

    .motherboard-title {
      margin: 0 0 12px;
      font-size: clamp(1.55rem, 2.5vw, 2.2rem);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .grid-25 {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      max-width: 980px;
      margin: 0 auto 22px;
    }

    .btn-pearl, .chip, .subblock-tab, .btn-more {
      border: 2px solid rgba(255,255,255,0.48);
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    }

    .btn-pearl { width: 100%; padding: 12px 10px; color: #fff; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; }
    
    .btn-fucsia { background: linear-gradient(180deg, #ff9cf5, #cf00b9); }
    .btn-purple { background: linear-gradient(180deg, #bb84ff, #6d00ff); }
    .btn-emerald { background: linear-gradient(180deg, #6bffd1, #00a86b); }
    .btn-blue { background: linear-gradient(180deg, #7fc6ff, #0047ff); }

    .btn-pearl.is-active, .chip.is-active {
      transform: translateY(3px);
      box-shadow: var(--active-glow);
      filter: brightness(1.2);
    }

    .tooltip-bubble {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 100;
      width: max-content;
      max-width: 200px;
    }

    .module-button-wrap:hover .tooltip-bubble { opacity: 1; transform: translateX(-50%) translateY(0); }

    .dropdown-panel { display: none; width: 100%; margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; }
    .dropdown-panel.is-open { display: block; }

    .selection-status {
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    /* Gemas */
    .gem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 15px; width: 100%; margin: 20px 0; }
    .gem-ia { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; transition: transform 0.2s; }
    .gem-ia.is-active { transform: scale(1.2); border-color: var(--gold-base); box-shadow: 0 0 15px #fff; }

    /* Footer Terminal */
    .footer-terminal { width: 100%; max-width: 1200px; margin-top: 50px; }
    .screen-box { background: #1a1a1a; border: 2px solid var(--gold-base); border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
    .screen-head { background: var(--gold-base); color: #000; padding: 10px 20px; display: flex; justify-content: space-between; font-weight: bold; }
    .screen-body { padding: 20px; min-height: 100px; color: #4EEDCA; font-family: monospace; word-break: break-word; }
    .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .footer-btn { padding: 20px; border-radius: 50px; border: 4px solid currentColor; background: #000; cursor: pointer; font-weight: 900; transition: all 0.2s; }
    .footer-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

    .arbelo-rights { margin-top: 40px; text-align: center; color: var(--gold-base); padding-bottom: 40px; }

    @media (max-width: 768px) {
      .grid-25 { grid-template-columns: repeat(2, 1fr); }
      .card-inner { padding: 20px 15px; border-radius: 40px; }
      .header-nav { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="header-nav">
    <a href="#" class="home-link">🏠 HOME</a>
    <div class="brand-block">
      <p class="brand-name">Arbelo Digital Studio</p>
      <p class="tool-name"> VISUAL PRO Alchemy</p>
    </div>
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn is-active" data-lang="es">ES PAÑOL</button>
      <button class="lang-btn" data-lang="en">EN GLISH</button>
    </div>
  </div>

  <div class="app-viewport" id="app"></div>

  <script>
    const APP_STATE = {
      language: "es",
      selectedByKey: {},
      selectedMultiByKey: {},
      selectedGemByKey: {},
      openDropdowns: {},
      activeSubblockByModule: {
        modulo8: "hair-style", modulo9: "eyes-shape", modulo10: "outfit-style",
        modulo11: "background", modulo12: "lighting", modulo20: "scene-props",
        modulo23: "creative-type", modulo24: "asset-type"
      }
    };

    const BUTTON_VARIANTS = ["btn-fucsia", "btn-purple", "btn-emerald", "btn-blue"];

    function t(node) { return node?.[APP_STATE.language] || node?.es || ""; }

    function normalizeId(val) { return String(val).toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''); }

    function makeOption(en, es, tEs = "", tEn = "") {
      return { id: normalizeId(en), label: { es, en }, tooltip: { es: tEs || es, en: tEn || en } };
    }

    // Configuración de Módulos (Se mantienen todos tus módulos inyectados)
    const MODULES = [
      {
        id: "modulo1",
        type: "single",
        titulo: { es: "MÓDULO 1 — TIPO DE CREACIÓN", en: "MODULE 1 — CREATION TYPE" },
        descripcion: { es: "Define qué pieza visual se va a construir.", en: "Define which visual piece will be built." },
        opciones: [
          makeOption("General", "General"), makeOption("Sticker", "Sticker"),
          makeOption("Portrait", "Retrato"), makeOption("Poster", "Poster"),
          makeOption("Book Cover", "Portada Libro"), makeOption("Pattern", "Patrón Repetible")
        ]
      },
      {
        id: "modulo2",
        type: "single",
        titulo: { es: "MÓDULO 2 — DESTINO COMERCIAL", en: "MODULE 2 — COMMERCIAL DESTINATION" },
        descripcion: { es: "Orienta el prompt según el mercado.", en: "Orients the prompt for the market." },
        opciones: [
          makeOption("Etsy", "Etsy"), makeOption("Amazon KDP", "Amazon KDP"),
          makeOption("Shopify", "Shopify"), makeOption("Social Media", "Redes Sociales")
        ]
      },
      {
        id: "modulo3",
        type: "single",
        titulo: { es: "MÓDULO 3 — VISUAL STYLE", en: "MODULE 3 — VISUAL STYLE" },
        descripcion: { es: "Define el lenguaje visual principal.", en: "Defines the main visual language." },
        opciones: [
          makeOption("Cartoon 3D", "Cartoon 3D"), makeOption("Watercolor", "Acuarela"),
          makeOption("Cyberpunk", "Cyberpunk"), makeOption("Minimalist", "Minimalista")
        ]
      },
      {
        id: "modulo10",
        type: "multi_subblocks",
        titulo: { es: "👗 MÓDULO 10 — OUTFIT & BEAUTY", en: "👗 MODULE 10 — OUTFIT & BEAUTY" },
        descripcion: { es: "Define vestuario y detalles estéticos.", en: "Defines outfit and aesthetic details." },
        subbloques: [
          {
            id: "outfit-style",
            type: "single_custom",
            title: { es: "Estilo de Ropa", en: "Clothing Style" },
            customPlaceholder: { es: "Ej: Vestido de gala...", en: "E.g.: Gala dress..." },
            opciones: [makeOption("Boss Baddie", "Boss Baddie"), makeOption("Luxury", "Lujo")]
          },
          {
            id: "makeup",
            type: "multi_custom",
            title: { es: "Maquillaje", en: "Makeup" },
            opciones: [makeOption("Natural", "Natural"), makeOption("Glam", "Glamuroso")]
          }
        ]
      },
      {
        id: "modulo23",
        type: "multi_subblocks",
        titulo: { es: "📣 MÓDULO 23 — PRODUCT AD", en: "📣 MODULE 23 — PRODUCT AD" },
        descripcion: { es: "Visuales publicitarios de alto impacto.", en: "High impact advertising visuals." },
        subbloques: [
          {
            id: "creative-type",
            type: "single_custom",
            title: { es: "Tipo de Anuncio", en: "Ad Type" },
            opciones: [makeOption("Promo Banner", "Banner Promocional"), makeOption("Story Ad", "Anuncio para Story")]
          }
        ]
      }
      // ... Se asume que el resto de tus módulos (24, etc) siguen este patrón
    ];

    function renderApp() {
      const container = document.getElementById("app");
      container.innerHTML = MODULES.map(m => {
        if (m.type === "single" || m.type === "single_custom") return renderSingleModule(m);
        if (m.type === "multi_subblocks") return renderMultiSubblocks(m);
        return "";
      }).join("");
      bindEvents();
      updatePrompts();
    }

    function renderSingleModule(m) {
      const selected = APP_STATE.selectedByKey[m.id];
      return `
        <section class="section-block">
          <div class="card-inner">
            <h3>${t(m.titulo)}</h3>
            <p>${t(m.descripcion)}</p>
            <div class="grid-25">
              ${m.opciones.map((opt, i) => `
                <div class="module-button-wrap">
                  <button class="btn-pearl ${BUTTON_VARIANTS[i%4]} ${selected === opt.id ? 'is-active' : ''}" 
                          onclick="selectSingle('${m.id}', '${opt.id}')">
                    ${t(opt.label)}
                  </button>
                  <div class="tooltip-bubble">${t(opt.tooltip)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderMultiSubblocks(m) {
      const activeId = APP_STATE.activeSubblockByModule[m.id];
      const sub = m.subbloques.find(s => s.id === activeId);
      return `
        <section class="section-block">
          <div class="card-inner">
            <h3>${t(m.titulo)}</h3>
            <div class="subblock-tabs">
              ${m.subbloques.map(s => `
                <button class="lang-btn ${s.id === activeId ? 'is-active' : ''}" 
                        onclick="APP_STATE.activeSubblockByModule['${m.id}']='${s.id}'; renderApp();">
                  ${t(s.title)}
                </button>
              `).join("")}
            </div>
            <div class="grid-25" style="margin-top:20px">
               ${sub.opciones.map((opt, i) => `
                 <button class="btn-pearl ${BUTTON_VARIANTS[i%4]} ${APP_STATE.selectedByKey[m.id+'_'+sub.id] === opt.id ? 'is-active' : ''}"
                         onclick="selectSingle('${m.id+'_'+sub.id}', '${opt.id}')">
                   ${t(opt.label)}
                 </button>
               `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function selectSingle(key, id) {
      APP_STATE.selectedByKey[key] = id;
      renderApp();
    }

    function updatePrompts() {
      const selections = Object.values(APP_STATE.selectedByKey).map(id => id.replace(/-/g, ' '));
      const prompt = selections.length > 0 ? selections.join(", ") : "Esperando selecciones...";
      document.getElementById("footer-prompt-en").textContent = "Visual prompt: " + prompt;
      document.getElementById("footer-prompt-es").textContent = "Prompt visual: " + prompt;
    }

    function bindEvents() {
      document.querySelectorAll("[data-lang]").forEach(b => {
        b.onclick = () => {
          APP_STATE.language = b.dataset.lang;
          document.querySelectorAll("[data-lang]").forEach(x => x.classList.remove("is-active"));
          b.classList.add("is-active");
          renderApp();
        };
      });
    }

    renderApp();
  </script>

  <section class="footer-terminal">
    <div class="screen-box">
      <div class="screen-head">
        <span>ENGLISH PROMPT</span>
        <button class="home-link" style="padding:5px 15px" onclick="navigator.clipboard.writeText(document.getElementById('footer-prompt-en').innerText)">COPIAR</button>
      </div>
      <div class="screen-body" id="footer-prompt-en"></div>
    </div>

    <div class="screen-box">
      <div class="screen-head">
        <span>PROMPT ESPAÑOL</span>
        <button class="home-link" style="padding:5px 15px" onclick="navigator.clipboard.writeText(document.getElementById('footer-prompt-es').innerText)">COPIAR</button>
      </div>
      <div class="screen-body" id="footer-prompt-es"></div>
    </div>

    <div class="footer-grid">
      <button class="footer-btn btn-green" onclick="location.reload()">SORPRENDE</button>
      <button class="footer-btn btn-blue" onclick="window.scrollTo(0,0)">SUBIR</button>
      <button class="footer-btn btn-red" onclick="APP_STATE.selectedByKey={}; renderApp();">BORRAR</button>
    </div>
  </section>

  <div class="arbelo-rights">
    <strong>Arbelo Digital Studio</strong><br>
    © 2026 Todos los derechos reservados.
  </div>

</body>
</html>
