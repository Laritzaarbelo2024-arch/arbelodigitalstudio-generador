<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt OS Full Candy Builder</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
background:#f7f4fb;
color:#2b2b2b;
}

/* HEADER */
header{
padding:18px;
text-align:center;
font-weight:600;
letter-spacing:1px;
background: rgba(255,255,255,0.7);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(0,0,0,0.05);
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:12px;
padding:14px;
}

/* BLOCK */
.block{
background:#ffffff;
border-radius:20px;
padding:12px;
box-shadow: 0 8px 20px rgba(0,0,0,0.06);
border:1px solid rgba(0,0,0,0.04);
}

h3{
margin:0 0 10px 0;
font-size:13px;
color:#a78bfa;
}

/* BUTTONS */
button{
margin:5px;
padding:9px 12px;
border:none;
border-radius:999px;
font-size:11px;
cursor:pointer;

background: linear-gradient(145deg, #ffe6f0, #e6f0ff);
color:#3a3a3a;

box-shadow:
0 6px 12px rgba(0,0,0,0.08),
inset 0 1px 0 rgba(255,255,255,0.9);

transition: all 0.25s ease;
}

button:hover{
transform: translateY(-3px) scale(1.02);
box-shadow:0 12px 20px rgba(0,0,0,0.12);
}

/* PROMPT BOX */
.prompt-box{
margin:14px;
padding:14px;
min-height:100px;
border-radius:20px;

background:#ffffff;
border:1px solid rgba(0,0,0,0.05);

white-space:pre-wrap;

box-shadow: inset 0 0 18px rgba(0,0,0,0.04);
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
padding:14px;
}

.actions button{
flex:1;
padding:10px;
font-weight:600;
border-radius:999px;
}

.primary{
background: linear-gradient(145deg, #cdb4ff, #bde0fe);
color:#1f1f1f;
}

.primary:hover{
box-shadow:0 0 18px rgba(189,224,254,0.6);
}

.danger{
background: linear-gradient(145deg, #ffd6e0, #ffafcc);
color:#5a1f2b;
}
</style>
</head>

<body>

<header>PROMPT OS — FULL CANDY BUILDER</header>

<div class="prompt-box" id="promptBox">
Tu prompt se construye aquí...
</div>

<div class="container">

<!-- SCENE -->
<div class="block">
<h3>🎬 Escenas</h3>
<button onclick="add('urban cinematic street scene')">Urbana</button>
<button onclick="add('natural outdoor adventure scene')">Aventura</button>
<button onclick="add('studio controlled lighting scene')">Estudio</button>
<button onclick="add('commercial product scene')">Producto</button>
</div>

<!-- PERSPECTIVAS -->
<div class="block">
<h3>📷 Perspectiva</h3>
<button onclick="add('point of view shot')">POV</button>
<button onclick="add('shot from behind')">Desde atrás</button>
<button onclick="add('over the shoulder shot')">Over Shoulder</button>
<button onclick="add('front view composition')">Frontal</button>
<button onclick="add('three quarter view')">3/4</button>
<button onclick="add('symmetrical composition shot')">Simétrico</button>
<button onclick="add('centered composition')">Centrado</button>
<button onclick="add('off center artistic composition')">Off Center</button>
<button onclick="add('forced perspective illusion shot')">Perspectiva forzada</button>
</div>

<!-- SUJETO -->
<div class="block">
<h3>🧍 Sujeto</h3>
<button onclick="add('curvy woman defined facial structure natural skin texture freckles')">Mujer</button>
<button onclick="add('male athletic model cinematic presence')">Hombre</button>
<button onclick="add('fashion influencer lifestyle aesthetic')">Influencer</button>
</div>

<!-- LUZ -->
<div class="block">
<h3>💡 Luz</h3>
<button onclick="add('golden hour natural sunlight from horizon')">Golden Hour</button>
<button onclick="add('soft studio lighting')">Studio suave</button>
<button onclick="add('volumetric cinematic lighting')">Volumétrico</button>
</div>

<!-- ESTILO -->
<div class="block">
<h3>🎨 Estilo</h3>
<button onclick="add('ultra realistic photography')">Realista</button>
<button onclick="add('anime style illustration')">Anime</button>
<button onclick="add('pixar style 3D render')">Pixar</button>
</div>

<!-- CALIDAD -->
<div class="block">
<h3>🔥 Calidad</h3>
<button onclick="add('hyper detailed textures cinematic 8k')">Ultra</button>
<button onclick="add('ugc iphone latest generation capture')">iPhone</button>
</div>

<!-- NARRATIVA -->
<div class="block">
<h3>🌍 Narrativa</h3>
<button onclick="add('scene conveys adventure freedom and high performance lifestyle')">Aventura / Libertad</button>
<button onclick="add('minimal luxury lifestyle aesthetic')">Lujo minimal</button>
</div>

</div>

<div class="actions">
<button class="primary" onclick="copyPrompt()">Copiar Prompt</button>
<button class="danger" onclick="resetPrompt()">Reset</button>
</div>

<script>

let parts = [];

function add(text){
parts.push(text);
document.getElementById("promptBox").innerText = parts.join(", ");
}

function copyPrompt(){
navigator.clipboard.writeText(parts.join(", "));
alert("Prompt copiado");
}

function resetPrompt(){
parts = [];
document.getElementById("promptBox").innerText = "Tu prompt se construye aquí...";
}

</script>

</body>
</html>
