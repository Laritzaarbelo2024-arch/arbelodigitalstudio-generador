
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo | Vertical Impact v12.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-deep: #0a2208; --oro-fuerte: #d4af37; --white: #ffffff; 
            --verde-boton: #1a4314; --rojo-luxe: #8b0000;
        }
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--verde-deep); color: var(--white); 
            height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory;
        }

        /* Secciones de Pantalla Completa Vertical */
        section { 
            height: 100vh; width: 100%; display: flex; flex-direction: column; 
            justify-content: center; padding: 20px; scroll-snap-align: start;
            border-bottom: 2px solid var(--oro-fuerte);
        }

        .header-main { text-align: center; margin-bottom: 30px; }
        .header-main h1 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; color: var(--oro-fuerte); margin: 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .header-main p { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; color: var(--white); opacity: 0.8; }

        h2 { font-size: 1.2rem; color: var(--oro-fuerte); text-transform: uppercase; margin-bottom: 20px; border-left: 5px solid var(--white); padding-left: 15px; }

        /* Grilla de Botones Llamativos */
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .opt-btn { 
            background: var(--verde-boton); border: 3px solid var(--oro-fuerte); 
            padding: 20px 10px; border-radius: 15px; color: var(--white); 
            font-weight: 800; font-size: 0.8rem; cursor: pointer;
            box-shadow: 0 8px 0 #000; transition: 0.1s;
        }
        .opt-btn:active, .opt-btn.active { 
            background: var(--oro-fuerte); color: var(--verde-deep); 
            transform: translateY(6px); box-shadow: 0 2px 0 #000;
        }

        /* Consola de Control Persistente (Abajo) */
        .console-fixed { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--white); padding: 20px; border-radius: 30px 30px 0 0;
            border-top: 5px solid var(--oro-fuerte); z-index: 10000;
        }
        #prompt-res { color: var(--verde-deep); font-weight: 800; font-size: 0.85rem; text-align: center; margin-bottom: 15px; min-height: 40px; }
        
        .ia-apps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .ia-btn { 
            padding: 12px; border: none; border-radius: 10px; color: white; 
            font-size: 0.6rem; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }

        /* Flecha de "Desliza para abajo" */
        .scroll-down { text-align: center; color: var(--oro-fuerte); font-size: 0.7rem; margin-top: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <section>
        <div class="header-main">
            <h1>ARBELO</h1>
            <p>Digital Studio ✨</p>
        </div>
        <h2>01. ADN & Autoridad</h2>
        <div class="btn-grid">
            <button class="opt-btn" onclick="tg(this)">Old Money 💎</button>
            <button class="opt-btn" onclick="tg(this)">Modern Luxe ✨</button>
            <button class="opt-btn" onclick="tg(this)">Coach Luxe ⚖️</button>
            <button class="opt-btn" onclick="tg(this)">Poder Ejecutivo 💼</button>
        </div>
        <div class="scroll-down">DESLIZA PARA CONTINUAR ▼</div>
    </section>

    <section>
        <h2>02. Identidad Visual</h2>
        <div class="btn-grid">
            <button class="opt-btn" onclick="tg(this)">Pelo Rizo 🌀</button>
            <button class="opt-btn" onclick="tg(this)">Moño Pulido 👱‍♀️</button>
            <button class="opt-btn" onclick="tg(this)">Ondas al Agua 🌊</button>
            <button class="opt-btn" onclick="tg(this)">Rubio Platino 👩🏼</button>
        </div>
        <div class="scroll-down">SIGUE BAJANDO ▼</div>
    </section>

    <section>
        <h2>03. Productos & Lujo</h2>
        <div class="btn-grid">
            <button class="opt-btn" onclick="tg(this)" style="border-color:var(--rojo-luxe)">Suela Roja 👠</button>
            <button class="opt-btn" onclick="tg(this)">Libro 3D 📖</button>
            <button class="opt-btn" onclick="tg(this)">Agenda Cuero 📓</button>
            <button class="opt-btn" onclick="tg(this)">Joyas Diamante 💍</button>
        </div>
        <div class="scroll-down">ÚLTIMO PASO ▼</div>
    </section>

    <section>
        <h2>04. Motor Video & 3D</h2>
        <div class="btn-grid">
            <button class="opt-btn" onclick="tg(this)">3D Pixar 🎬</button>
            <button class="opt-btn" onclick="tg(this)">Unreal Engine 5 🎮</button>
            <button class="opt-btn" onclick="tg(this)">Higgsfield Mov 🎞️</button>
            <button class="opt-btn" onclick="tg(this)">Octane Render 🌟</button>
        </div>
    </section>

    <div class="console-fixed">
        <div id="prompt-res">Configura tu ingeniería visual... 🚀</div>
        <div class="ia-apps">
            <button class="ia-btn" style="background:#4285F4" onclick="cp('G. Flow')">G. Flow</button>
            <button class="ia-btn" style="background:#0062ff" onclick="cp('Freepik')">Freepik</button>
            <button class="ia-btn" style="background:#ff0055" onclick="cp('Higgsfield')">Higgsfield</button>
            <button class="ia-btn" style="background:#10a37f" onclick="cp('DALL-E 3')">DALL-E 3</button>
            <button class="ia-btn" style="background:#c5a059; color:black" onclick="cp('Gemini')">Gemini</button>
            <button class="ia-btn" style="background:#333" onclick="res()">Limpiar</button>
        </div>
    </div>

    <script>
        let s = new Set();
        function tg(el) {
            el.classList.toggle('active');
            if(el.classList.contains('active')) s.add(el.innerText); else s.delete(el.innerText);
            document.getElementById('prompt-res').innerText = Array.from(s).join(" + ") || "Configura tu ingeniería visual... 🚀";
        }
        function cp(app) {
            const p = document.getElementById('prompt-res').innerText;
            navigator.clipboard.writeText(`[ARBELO - ${app.toUpperCase()}]: ${p}`);
            alert("✨ Copiado para " + app);
        }
        function res() {
            s.clear();
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('prompt-res').innerText = "Configura tu ingeniería visual... 🚀";
        }
    </script>
</body>
</html>
