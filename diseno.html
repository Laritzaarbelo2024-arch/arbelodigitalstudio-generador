
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo | Multi-Page Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1a4314; --oro: #bfa145; --white: #ffffff; --bg: #f8f9fa; }
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .canva-frame { 
            background: var(--white); width: 100%; max-width: 500px; 
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* Barra de Progreso */
        .progress-bar { display: flex; height: 6px; background: #eee; }
        .progress-fill { height: 100%; background: var(--verde); transition: 0.5s; width: 25%; }

        /* Páginas */
        .page { flex: 1; padding: 30px 20px; overflow-y: auto; display: none; animation: slide 0.4s ease; }
        .page.active { display: block; }
        @keyframes slide { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

        h2 { color: var(--verde); font-size: 1.2rem; border-left: 5px solid var(--oro); padding-left: 10px; margin-bottom: 25px; }

        /* Botones de Píldora (Estilo el video que enviaste) */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .opt-btn { 
            background: #fff; border: 2.5px solid #eee; padding: 15px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; text-align: center;
            transition: 0.2s; box-shadow: 0 4px 0 #eee;
        }
        .opt-btn.active { 
            background: var(--verde); color: white; border-color: var(--verde); 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3); transform: translateY(4px);
        }

        /* Navegación Inferior Estilo Canva */
        .nav-controls { padding: 15px; display: flex; justify-content: space-between; background: var(--white); border-top: 1px solid #eee; }
        .nav-btn { background: var(--oro); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* Consola Flotante (Siempre Visible) */
        .console { 
            background: var(--verde); color: white; padding: 20px; 
            border-radius: 25px 25px 0 0; border-top: 4px solid var(--oro);
        }
        #result { font-size: 0.8rem; min-height: 40px; margin-bottom: 10px; text-align: center; font-style: italic; opacity: 0.9; }
        .copy-group { display: flex; gap: 8px; justify-content: center; }
        .copy-btn { padding: 8px 12px; border: none; border-radius: 10px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="canva-frame">
    <div class="progress-bar"><div class="progress-fill" id="p-bar"></div></div>

    <div class="page active" id="page1">
        <h2>Página 1: ADN & Estrategia</h2>
        <div class="grid">
            <button class="opt-btn" onclick="tg(this)">Old Money 💎</button>
            <button class="opt-btn" onclick="tg(this)">Modern Luxe ✨</button>
            <button class="opt-btn" onclick="tg(this)">Barbie Core 🎀</button>
            <button class="opt-btn" onclick="toggle(this)">Poder Ejecutivo 💼</button>
            <button class="opt-btn" onclick="tg(this)">Coach Luxe ⚖️</button>
            <button class="opt-btn" onclick="tg(this)">Mujer Latina 💃</button>
        </div>
    </div>

    <div class="page" id="page2">
        <h2>Página 2: Rostro & Cabello</h2>
        <div class="grid">
            <button class="opt-btn" onclick="tg(this)">Pelo Rizo 🌀</button>
            <button class="opt-btn" onclick="tg(this)">Moño Pulido 👱‍♀️</button>
            <button class="opt-btn" onclick="tg(this)">Ondas Pro 🌊</button>
            <button class="opt-btn" onclick="tg(this)">Rubio Platino 👩🏼</button>
            <button class="opt-btn" onclick="tg(this)">Afro Chic ✊🏿</button>
            <button class="opt-btn" onclick="tg(this)">Glowy HD ✨</button>
        </div>
    </div>

    <div class="page" id="page3">
        <h2>Página 3: Productos & Lujo</h2>
        <div class="grid">
            <button class="opt-btn" onclick="tg(this)">Suela Roja 👠</button>
            <button class="opt-btn" onclick="tg(this)">Mocasin Lujo 👞</button>
            <button class="opt-btn" onclick="tg(this)">Libro 3D 📖</button>
            <button class="opt-btn" onclick="tg(this)">Agenda Cuero 📓</button>
            <button class="opt-btn" onclick="tg(this)">Perfume Pro 🧪</button>
            <button class="opt-btn" onclick="tg(this)">Joyas Diamante 💍</button>
        </div>
    </div>

    <div id="page4" class="page">
        <h2>Página 4: Magia & Video</h2>
        <div class="grid">
            <button class="opt-btn" onclick="tg(this)">3D Pixar 🎬</button>
            <button class="opt-btn" onclick="tg(this)">Unreal Engine 5 🎮</button>
            <button class="opt-btn" onclick="tg(this)">Slow Motion 🐢</button>
            <button class="opt-btn" onclick="tg(this)">Octane Render 🌟</button>
            <button class="opt-btn" onclick="tg(this)">Holographic FX 🌌</button>
            <button class="opt-btn" onclick="tg(this)">Drone FPV 🛸</button>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" class="disabled">Atrás</button>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">Siguiente</button>
    </div>

    <div class="console">
        <div id="result">Selecciona tu magia visual...</div>
        <div class="copy-group">
            <button class="copy-btn" style="background:#4db6ac" onclick="cp()">Freepik</button>
            <button class="copy-btn" style="background:#ff8a80" onclick="cp()">Higgsfield</button>
            <button class="copy-btn" style="background:#81d4fa; color:black" onclick="cp()">Dalle 3</button>
            <button class="copy-btn" style="background:#3d3d3d" onclick="res()">Reset</button>
        </div>
    </div>
</div>

<script>
    let s = new Set();
    let cur = 1;

    function tg(el) {
        el.classList.toggle('active');
        if(el.classList.contains('active')) s.add(el.innerText); else s.delete(el.innerText);
        document.getElementById('result').innerText = Array.from(s).join(" + ") || "Selecciona tu magia visual...";
    }

    function changePage(dir) {
        document.getElementById(`page${cur}`).classList.remove('active');
        cur += dir;
        document.getElementById(`page${cur}`).classList.add('active');
        
        document.getElementById('p-bar').style.width = (cur * 25) + "%";
        document.getElementById('prevBtn').style.opacity = cur === 1 ? "0.3" : "1";
        document.getElementById('nextBtn').innerText = cur === 4 ? "Finalizar" : "Siguiente";
    }

    function cp() {
        navigator.clipboard.writeText(document.getElementById('result').innerText);
        alert("¡Prompt Arbelo Copiado! 🚀");
    }

    function res() {
        s.clear();
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('result').innerText = "Selecciona tu magia visual...";
    }
</script>
</body>
</html>
