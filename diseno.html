
<style>
    :root {
        --neon-green: #00ff41; 
        --neon-blue: #00f3ff; 
        --bg-dark: #050505; 
        --panel-glass: rgba(15, 15, 15, 0.95);
    }

    body { 
        background-color: var(--bg-dark); 
        color: white; 
        font-family: 'Inter', sans-serif; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding-bottom: 300px; 
    }
    
    h1 { 
        color: var(--neon-green); 
        text-transform: uppercase; 
        letter-spacing: 6px; 
        border-bottom: 2px solid var(--neon-green); 
        margin-bottom: 40px; 
        text-shadow: 0 0 15px rgba(0, 255, 65, 0.5); 
        font-family: 'Playfair Display', serif; 
        font-style: italic;
    }
    
    .module { 
        background: #0d0d0d; 
        border-left: 5px solid var(--neon-green); 
        padding: 25px; 
        margin: 20px 0; 
        width: 95%; 
        max-width: 1100px; 
        border-radius: 4px 15px 15px 4px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h3 { font-size: 0.9em; letter-spacing: 2px; color: #eee; border-bottom: 1px solid #222; padding-bottom: 12px; }

    .capsula-edu { 
        background: rgba(0, 243, 255, 0.03); 
        border: 1px solid rgba(0, 243, 255, 0.2); 
        padding: 15px; 
        border-radius: 10px; 
        margin-bottom: 20px; 
    }

    .capsula-edu span { font-size: 0.75em; color: var(--neon-blue); font-style: italic; }

    /* --- DISEÑO DE BOTONES ORIGINALES --- */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
        gap: 15px; 
    }

    button { 
        background: linear-gradient(145deg, #1a1a1a, #080808) !important;
        border: 1px solid #333 !important;
        color: #777 !important;
        padding: 15px !important;
        border-radius: 12px !important;
        cursor: pointer;
        font-size: 0.7em !important;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        box-shadow: 5px 5px 15px rgba(0,0,0,0.4), inset 1px 1px 1px rgba(255,255,255,0.05) !important;
    }

    button:hover { 
        color: #fff !important;
        border-color: #555 !important;
        transform: translateY(-3px) !important;
        box-shadow: 0 10px 20px rgba(0,0,0,0.6) !important;
    }

    /* ESTADO ACTIVO: EL EFECTO DE LUZ HACIA EL FONDO NEGRO */
    button.active { 
        background: #000 !important;
        color: var(--neon-green) !important;
        border-color: var(--neon-green) !important;
        box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 10px rgba(0, 255, 65, 0.2) !important;
        text-shadow: 0 0 8px var(--neon-green) !important;
    }

    /* Botón Clon con luz azul */
    .btn-clon { border-color: var(--neon-blue) !important; color: var(--neon-blue) !important; }
    .btn-clon.active { 
        color: var(--neon-blue) !important; 
        border-color: var(--neon-blue) !important; 
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.2) !important;
        text-shadow: 0 0 8px var(--neon-blue) !important;
    }

    /* --- PANEL DE RESULTADOS REESTRUCTURADO --- */
    #master-panel { 
        position: sticky; bottom: 20px; 
        width: 95%; max-width: 900px; 
        background: var(--panel-glass); 
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 243, 255, 0.3); 
        padding: 25px; 
        border-radius: 25px; 
        box-shadow: 0 -20px 50px rgba(0,0,0,0.9);
    }

    .output-stack { display: flex; flex-direction: column; gap: 20px; }
    
    .box-label { font-family: 'Playfair Display', serif; font-size: 0.8em; color: #666; font-style: italic; margin-bottom: 5px; display: block; }

    textarea { 
        width: 100%; background: rgba(0,0,0,0.6); 
        border: 1px solid #222; border-radius: 15px; 
        padding: 18px; color: #ccc; font-size: 0.9em; line-height: 1.6;
        resize: none; outline: none; transition: 0.3s;
    }
    #out-en { color: var(--neon-blue); font-family: 'Courier New', monospace; font-weight: bold; }

    .panel-actions { 
        display: flex; justify-content: flex-end; 
        gap: 15px; margin-top: 20px; 
        padding-top: 15px; border-top: 1px solid #222; 
    }

    .btn-p { 
        padding: 14px 28px; border-radius: 10px; border: none; 
        font-weight: bold; text-transform: uppercase; font-size: 0.75em; 
        cursor: pointer; transition: 0.3s; 
    }

    .btn-copy { background: var(--neon-green) !important; color: black !important; box-shadow: 0 0 20px rgba(0, 255, 65, 0.4) !important; }
    .btn-copy:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--neon-green) !important; }
    
    .btn-del { background: #1a1a1a; color: #555; border: 1px solid #333; }
    .btn-del:hover { color: #ff4b4b; border-color: #ff4b4b; }
</style>
