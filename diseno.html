

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital | AI Software</title>
    <style>
        :root {
            --fondo: #fba667; /* Fondo mucho más saturado y vibrante */
            --mint: #45c4a0;  /* Verde más fuerte */
            --pink: #f26d7d;  /* Rosa más fuerte */
            --peach: #f39c12; /* Naranja más fuerte */
            --lavender: #7487f1; /* Lavanda más fuerte */
            --marron-marca: #3d241e; /* Color de marca bien oscuro y potente */
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 25px 0;
        }

        .header h1 {
            color: var(--marron-marca);
            font-size: 2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 1px 1px 0px white;
        }

        .scroll-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-block {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .column-title {
            color: var(--marron-marca);
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-option {
            border: none;
            padding: 10px 2px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-option.active { 
            outline: 3px solid var(--marron-marca); 
            transform: scale(0.95);
            box-shadow: none;
        }

        .btn-pink { background: var(--pink); color: white; }
        .btn-mint { background: var(--mint); color: white; }
        .btn-lavender { background: var(--lavender); color: white; }
        .btn-peach { background: var(--peach); color: white; }

        /* CAJA DE RESULTADO */
        .prompt-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid var(--marron-marca);
            border-radius: 25px;
            padding: 18px;
            margin-top: 20px;
            position: sticky;
            bottom: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-lang {
            padding: 6px 18px;
            border-radius: 12px;
            border: 2px solid var(--marron-marca);
            background: white;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--marron-marca);
        }

        .btn-lang.active { background: var(--marron-marca); color: white; }

        #result {
            background: #fff8f0;
            padding: 15px;
            border-radius: 15px;
            min-height: 50px;
            font-size: 0.85rem;
            color: #222;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            line-height: 1.4;
            font-weight: 500;
        }

        .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        
        .btn-action {
            padding: 12px 20px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .btn-copy { background: #e67e22; }
        .btn-clear { background: #3498db; }
        .btn-others { background: #9b59b6; }

        .back-link { text-decoration: none; color: var(--marron-marca); font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL MENÚ PRINCIPAL</a>

    <div class="header">
        <h1>ARBELO DIGITAL</h1>
    </div>

    <div class="scroll-container">
        <div class="category-block">
            <div class="column-title">🌸 Nicho Principal</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this, 'Business Mentor', 'Mentora de Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Skin Care Specialist', 'Especialista en Piel')">Belleza</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Content Creator', 'Creadora de Contenido')">Digital</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🎨 Texturas Profesionales</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggle(this, 'High-end Silk', 'Seda de lujo')">Seda</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Polished Marble', 'Mármol Pulido')">Mármol</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Frosted Glass', 'Vidrio Esmerilado')">Vidrio</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">💡 Iluminación de Estudio</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Softbox lighting', 'Luz de Softbox')">Suave</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Golden hour sunlight', 'Luz de atardecer')">Golden</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Global illumination', 'Iluminación Global')">Global</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">👗 Estilo & Outfits</div>
            <div class="options-grid">
                <button class="btn-option btn-peach" onclick="toggle(this, 'Old Money aesthetic', 'Estilo Old Money')">Old Money</button>
                <button class="btn-option btn-peach" onclick="toggle(this, 'Boss Lady blazer', 'Blazer ejecutiva')">Empoderada</button>
                <button class="btn-option btn-peach" onclick="toggle(this, 'Minimalist chic', 'Minimalista Chic')">Minimal</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">✨ Mood & Vibras</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this, 'Elegant & Sophisticated', 'Elegante y Sofisticado')">Sofisticado</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'High-end luxury', 'Lujo de alta gama')">Lujo</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Fresh & Modern', 'Fresco y Moderno')">Moderno</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">📸 Encuadre</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggle(this, 'Macro shot', 'Plano detalle')">Macro</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Eye level', 'A la altura de los ojos')">Frontal</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Upper body shot', 'Plano medio')">Medio</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🖼️ Parámetros Midjourney</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="toggle(this, '--ar 9:16', '--ar 9:16')">Vertical</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, '--ar 1:1', '--ar 1:1')">Cuadrado</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, '--v 6.0', '--v 6.0')">V 6.0</button>
            </div>
        </div>

        <div class="prompt-box">
            <div class="lang-selector">
                <button id="btn-en" class="btn-lang active" onclick="setLang('en')">INGLÉS</button>
                <button id="btn-es" class="btn-lang" onclick="setLang('es')">ESPAÑOL</button>
            </div>
            <div id="result">Esperando selección...</div>
            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyText()">♥ COPIAR</button>
                <button class="btn-action btn-others" onclick="addOthers()">OTROS IA</button>
                <button class="btn-action btn-clear" onclick="clearAll()">BORRAR TODO</button>
            </div>
        </div>
        <div style="height: 40px;"></div>
    </div>

    <script>
        let selectedEN = [];
        let selectedES = [];
        let currentLang = 'en';
        let othersText = "";

        function toggle(btn, en, es) {
            btn.classList.toggle('active');
            if (selectedEN.includes(en)) {
                selectedEN = selectedEN.filter(i => i !== en);
                selectedES = selectedES.filter(i => i !== es);
            } else {
                selectedEN.push(en);
                selectedES.push(es);
            }
            update();
        }

        function setLang(l) {
            currentLang = l;
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('btn-es').classList.toggle('active', l === 'es');
            update();
        }

        function addOthers() {
            // No quita nada, solo agrega o quita la coletilla
            if (othersText === "") {
                othersText = ", photorealistic, 8k, highly detailed, professional photography";
            } else {
                othersText = "";
            }
            update();
        }

        function update() {
            const res = document.getElementById('result');
            let base = currentLang === 'en' ? selectedEN.join(", ") : selectedES.join(", ");
            
            // Unimos lo seleccionado + la coletilla de otros (si existe)
            let finalPrompt = base + othersText;

            res.innerText = finalPrompt.length > 0 ? finalPrompt : (currentLang === 'en' ? "Waiting for selection..." : "Esperando selección...");
        }

        function clearAll() {
            selectedEN = []; selectedES = []; othersText = "";
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            update();
        }

        function copyText() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);
            alert("♥ ¡Prompt copiado!");
        }
    </script>
</body>
</html>
