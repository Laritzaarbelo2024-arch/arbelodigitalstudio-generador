<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VECTRA PROMPT SYSTEM</title>

<style>

/* =========================
   🌈 FONDO MATIZADO PREMIUM
========================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #3A3A3A;

  background:
    radial-gradient(circle at top left, #FFD6E8 0%, transparent 50%),
    radial-gradient(circle at top right, #D6F3FF 0%, transparent 50%),
    radial-gradient(circle at bottom, #FFF1D6 0%, transparent 55%),
    linear-gradient(180deg, #FFF8FB, #FFFFFF);
}

/* =========================
   📄 HOJA GLASS
========================= */

.container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;

  background: rgba(255, 255, 255, 0.75);
  max-width: 420px;
  margin: 0 auto;

  border-radius: 22px;

  box-shadow:
    0 30px 80px rgba(0,0,0,0.15),
    0 5px 20px rgba(0,0,0,0.08);

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.6);
}

/* =========================
   🧠 HEADER
========================= */

header {
  text-align: center;
  padding: 25px 15px;
  font-size: 22px;
  font-weight: 800;
  color: #FF5FA2;
}

.subheader {
  font-size: 12px;
  color: #777;
  margin-top: 5px;
}

/* =========================
   📜 SECCIONES
========================= */

.section {
  height: 100vh;
  padding: 22px;
  scroll-snap-align: start;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

.block-title {
  font-size: 16px;
  font-weight: 700;
  color: #444;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* =========================
   🔘 BOTONES 3D
========================= */

.btn {
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  font-weight: 600;
  cursor: pointer;

  background: linear-gradient(145deg, #FFE3EF, #FFD1E3);

  box-shadow:
    0 6px 0 rgba(0,0,0,0.08),
    0 10px 20px rgba(0,0,0,0.10);

  transition: all 0.2s ease;
}

.btn:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 10px 18px rgba(0,0,0,0.12),
    0 4px 0 rgba(0,0,0,0.08);
}

.btn:active {
  transform: translateY(2px) scale(0.98);
  box-shadow: 0 3px 0 rgba(0,0,0,0.08);
}

.option {
  background: linear-gradient(145deg, #FFF0F6, #FFE1EC);
}

/* =========================
   🧾 OUTPUT DUAL
========================= */

.builder {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #E9E9E9;
  padding: 10px;
}

.output-box {
  height: 180px;
  border-radius: 14px;

  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.08);

  backdrop-filter: blur(10px);
  overflow: hidden;

  display: flex;
  flex-direction: column;
}

.lang {
  height: 50%;
  padding: 10px;
  font-size: 12px;
  overflow-y: auto;
}

.lang.es {
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

/* =========================
   🔘 ACCIONES
========================= */

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.small-btn {
  border: none;
  border-radius: 999px;
  padding: 8px 14px;

  background: linear-gradient(145deg, #FF5FA2, #FF9EC4);
  color: white;
  font-weight: 600;
  cursor: pointer;

  box-shadow: 0 6px 12px rgba(0,0,0,0.12);
}

/* =========================
   📌 FOOTER
========================= */

footer {
  text-align: right;
  font-size: 12px;
  color: #8A8A8A;
  padding: 8px 12px;
}

</style>
</head>

<body>

  VECTRA PROMPT SYSTEM
  <div class="subheader">Sistema modular de creación de prompts visuales de alto nivel</div>
</header>

<div class="container">

  <!-- SUJETO -->

  <div class="section">

</div>

<!-- OUTPUT -->
<div class="builder">

  <div class="output-box">
    <div class="lang es">Español prompt aquí...</div>
    <div class="lang en">English prompt here...</div>
  </div>

  <div class="actions">
    <button class="small-btn">Copiar</button>

  <footer>© Arbelo Digital — Todos los derechos reservados</footer>

</div>

</body>
</html>
