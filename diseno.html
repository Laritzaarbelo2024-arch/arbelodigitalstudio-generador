
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital | Software</title>
    <style>
        :root {
            --fondo: #fba667; /* Fondo intenso y vibrante */
            --mint: #45c4a0;  
            --pink: #f26d7d;  
            --peach: #f39c12; 
            --lavender: #7487f1; 
            --marron-marca: #3d241e; /* Chocolate profundo */
        }

        body {
            background-color: var(--fondo);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 25px 0; }
        .header h1 {
            color: var(--marron-marca);
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 1px 1px 0px white;
        }

        .scroll-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-block {
            background: white;
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .column-title {
            color: var(--marron-marca);
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 botones por fila */
            gap: 5px;
        }

        .btn-option {
            border: none;
            padding: 8px 2px; /* Botones más pequeños y estéticos */
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
            color: white;
        }

        .btn-option.active { 
            outline: 3px solid var(--marron-marca); 
            transform: scale(0.92);
            box-shadow: none;
            filter: brightness(0.8);
        }

        .btn-pink { background: var(--pink); }
        .btn-mint { background: var(--mint); }
        .btn-lavender { background: var(--lavender); }
        .btn-peach { background: var(--peach); }

        /* EL NUEVO CUADRO BONITO */
        .prompt-box {
            background: rgba(255, 255, 255, 0.96);
            border: 4px solid var(--marron-marca);
            border-radius: 35px;
            padding: 18px;
            margin-top: 20px;
            position: sticky;
            bottom: 15px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 100;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-lang {
            flex: 1;
            padding: 7px;
            border-radius: 12px;
            border: 2px solid var(--marron-marca);
            background: white;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--marron-marca);
        }

        .btn-lang.active { background: var(--marron-marca); color: white; }

        .display-area {
            background: #fffcf5;
            padding: 10px;
            border-radius: 15px;
            min-height: 35px;
            font-size: 0.75rem;
            color: #222;
            margin-bottom: 10px;
            border: 1px solid #eee;
            text-align: left;
        }

        .display-area.active-box { border: 2px solid var(--mint); background: #f0fffb; }

        .actions { display: flex; justify-content: center; gap: 8px; }
        
        .btn-action {
            padding: 12px;
            border-radius: 18px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            flex: 1;
        }
        .btn-copy { background: var(--marron-marca); }
        .btn-clear { background: #e74c3c; }

        .back-link { text-decoration: none; color: var(--marron-marca); font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VOLVER AL ESTUDIO</a>

    <div class="header">
        <h1>ARBELO DIGITAL</h1>
    </div>

    <div class="scroll-container">
        
        <div class="category-block">
            <div class="column-title">🌸 Nicho de Mercado</div>
            <div class="options-grid">
                <button class="btn-option btn-pink" onclick="toggle(this, 'UGC Creator', 'Creadora UGC')">UGC</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Business Mentor', 'Mentora de Negocios')">Negocios</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'CEO Lifestyle', 'Estilo CEO')">Lifestyle</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Skincare Luxe', 'Lujo en Piel')">Belleza</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'Fashion Designer', 'Moda')">Moda</button>
                <button class="btn-option btn-pink" onclick="toggle(this, 'E-commerce Shop', 'E-com')">Ventas</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">🎨 Materiales Premium</div>
            <div class="options-grid">
                <button class="btn-option btn-mint" onclick="toggle(this, 'High-end Silk', 'Seda')">Seda</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Polished Marble', 'Mármol')">Mármol</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Golden details', 'Oro')">Oro</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Frosted Glass', 'Vidrio')">Vidrio</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Soft Velvet', 'Terciopelo')">Velvet</button>
                <button class="btn-option btn-mint" onclick="toggle(this, 'Rose Gold', 'Oro Rosa')">Rose Gold</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">💡 Iluminación</div>
            <div class="options-grid">
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Softbox lighting', 'Suave')">Softbox</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Golden hour sunlight', 'Atardecer')">Golden</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Studio lighting', 'Estudio')">Studio</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Natural light', 'Natural')">Natural</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Cinematic shadows', 'Sombras')">Cine</button>
                <button class="btn-option btn-lavender" onclick="toggle(this, 'Ring light', 'Aro de luz')">Aro Luz</button>
            </div>
        </div>

        <div class="category-block">
            <div class="column-title">👗 Estilo & Outfit</div>
            <div class="options-grid">
                <button class="btn-option btn-peach" onclick="toggle(this, 'Old Money aesthetic', 'Old Money')">Old Money</button>
                <button class="btn-option btn-peach" onclick="toggle(this, 'Boss Lady blazer', 'Ejecutiva')">Empoderada</button>
                <button class="btn-option btn-peach" onclick="toggle(this, 'Minimalist chic', 'Minimalista')">Minimal</button>
            </div>
        </div>

        <div class="prompt-box">
            <div class="lang-header">
                <button id="btn-en" class="btn-lang active" onclick="setCopyLang('en')">🇺🇸 INGLÉS</button>
                <button id="btn-es" class="btn-lang" onclick="setCopyLang('es')">🇪🇸 ESPAÑOL</button>
            </div>

            <div style="font-size: 0.55rem; font-weight: bold; color: #888; margin-bottom: 2px;">🇺🇸 PROMPT (COPIAR):</div>
            <div id="result-en" class="display-area active-box">Waiting...</div>

            <div style="font-size: 0.55rem; font-weight: bold; color: #888; margin-bottom: 2px;">🇪🇸 TRADUCCIÓN:</div>
            <div id="result-es" class="display-area">Esperando...</div>

            <div class="actions">
                <button class="btn-action btn-copy" onclick="copyResult()">♥ COPIAR</button>
                <button class="btn-action btn-clear" onclick="clearAll()">BORRAR</button>
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <script>
        let selectedEN = [];
        let selectedES = [];
        let activeCopyLang = 'en';

        function toggle(btn, en, es) {
            btn.classList.toggle('active');
            if (selectedEN.includes(en)) {
                selectedEN = selectedEN.filter(i => i !== en);
                selectedES = selectedES.filter(i => i !== es);
            } else {
                selectedEN.push(en);
                selectedES.push(es);
            }
            render();
        }

        function setCopyLang(lang) {
            activeCopyLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('result-en').classList.toggle('active-box', lang === 'en');
            document.getElementById('result-es').classList.toggle('active-box', lang === 'es');
        }

        function render() {
            const resEN = document.getElementById('result-en');
            const resES = document.getElementById('result-es');
            resEN.innerText = selectedEN.length > 0 ? selectedEN.join(", ") : "Waiting...";
            resES.innerText = selectedES.length > 0 ? selectedES.join(", ") : "Esperando...";
        }

        function clearAll() {
            selectedEN = []; selectedES = [];
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            render();
        }

        function copyResult() {
            const id = activeCopyLang === 'en' ? 'result-en' : 'result-es';
            const text = document.getElementById(id).innerText;
            if(text.includes("Wait") || text.includes("Esperando")) return;
            navigator.clipboard.writeText(text);
            alert("♥ Copiado correctamente");
        }
    </script>
</body>
</html>
