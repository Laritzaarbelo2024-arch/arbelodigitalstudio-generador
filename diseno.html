<style>
    :root {
        --neon-green: #00ff41; 
        --neon-blue: #00f3ff; 
        --neon-pink: #ff00ff;
        --neon-yellow: #ffcc00; 
        --bg-dark: #050505; 
        --card-bg: #111111;
    }

    body { 
        background-color: var(--bg-dark); 
        color: white; 
        font-family: 'Inter', sans-serif; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding-bottom: 280px; 
    }
    
    h1 { 
        color: var(--neon-green); 
        text-transform: uppercase; 
        letter-spacing: 5px; 
        border-bottom: 2px solid var(--neon-green); 
        margin-bottom: 30px; 
        text-shadow: 0 0 10px var(--neon-green); 
        text-align: center; 
        font-family: 'Playfair Display', serif; 
        font-size: 1.8em; 
        font-style: italic; 
    }
    
    .module { 
        background: var(--card-bg); 
        border-left: 4px solid var(--neon-green); 
        padding: 20px; 
        margin: 15px 0; 
        width: 95%; 
        max-width: 1100px; 
        border-radius: 0 12px 12px 0; 
        border-top: 1px solid rgba(255,255,255,0.03); 
    }

    h3 { 
        margin-top: 0; 
        color: #fff; 
        font-size: 0.85em; 
        text-transform: uppercase; 
        border-bottom: 1px solid #222; 
        padding-bottom: 10px; 
        letter-spacing: 2px; 
    }

    .capsula-edu { 
        background: rgba(0, 243, 255, 0.05); 
        border-radius: 8px; 
        padding: 12px; 
        margin-bottom: 15px; 
        border: 1px solid rgba(0, 243, 255, 0.15); 
        display: flex; 
        align-items: flex-start; 
        gap: 10px; 
    }

    .capsula-edu span { 
        font-size: 0.72em; 
        color: var(--neon-blue); 
        line-height: 1.5; 
        font-style: italic; 
    }

    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
        gap: 12px; 
        margin-top: 10px; 
        max-height: 250px; 
        overflow-y: auto; 
        padding: 10px; 
    }

    /* --- EL CAMBIO ESTÁ AQUÍ --- */
    /* NUEVO ESTILO BASE PARA TODOS LOS BOTONES DE MÓDULOS */
    button { 
        background: linear-gradient(145deg, #1a1a1a, #0d0d0d) !important; /* Forza el gradiente 3D */
        border: 1px solid #333 !important; 
        color: #999 !important; 
        padding: 14px !important; 
        cursor: pointer; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; /* Animación suave */
        font-size: 0.65em !important; 
        border-radius: 8px !important; 
        text-align: center;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.5) !important; /* Sombra sutil */
        position: relative; 
        overflow: hidden;
    }

    button:hover { 
        border-color: var(--neon-green) !important; 
        color: white !important; 
        transform: scale(1.03) !important; /* Micro-expansión */
    }
    
    /* EFECTO DE LUZ INTERNA (GLOW) CUANDO ESTÁ ACTIVO */
    button.active { 
        background: #000 !important; 
        color: var(--neon-green) !important; 
        font-weight: bold !important; 
        border-color: var(--neon-green) !important; 
        /* El "Glow" que pediste hacia el fondo negro */
        box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.2), 0 0 15px rgba(0, 255, 65, 0.3) !important;
        text-shadow: 0 0 5px var(--neon-green) !important;
    }

    /* Botón especial 'Mi Clon' */
    .btn-clon { 
        border: 1px solid var(--neon-blue) !important; 
        color: var(--neon-blue) !important; 
        background: rgba(0, 243, 255, 0.02) !important; 
    }
    .btn-clon.active {
        color: var(--neon-blue) !important;
        border-color: var(--neon-blue) !important;
        box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.2), 0 0 15px rgba(0, 243, 255, 0.3) !important;
        text-shadow: 0 0 5px var(--neon-blue) !important;
    }

    /* PANEL MAESTRO VERTICAL */
    #master-panel { 
        position: sticky; bottom: 15px; width: 95%; max-width: 900px; 
        background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px);
        border: 2px solid var(--neon-blue); padding: 20px; border-radius: 20px; 
        z-index: 1000; box-shadow: 0 -15px 40px rgba(0,0,0,0.9);
    }

    .output-stack { display: flex; flex-direction: column; gap: 15px; }

    textarea { 
        width: 100%; 
        background: #000; 
        border: 1px solid #222; 
        resize: none; 
        outline: none; 
        font-size: 0.88em; 
        padding: 15px; 
        border-radius: 10px; 
        height: 50px; 
        color: #ddd; 
    }

    #out-en { 
        color: var(--neon-blue); 
        font-family: monospace; 
        font-weight: bold; 
        border-color: rgba(0,243,255,0.1); 
    }

    .panel-actions { 
        display: flex; 
        justify-content: flex-end; 
        gap: 10px; 
        margin-top: 15px; 
        border-top: 1px solid #222; 
        padding-top: 10px; 
    }

    .btn-p { 
        padding: 12px 22px; 
        border-radius: 8px; 
        border: none; 
        font-weight: bold; 
        cursor: pointer; 
        text-transform: uppercase; 
        font-size: 0.72em; 
        transition: 0.3s; 
    }

    /* BOTÓN COPIAR SIEMPRE EN VERDE NEÓN CON GLOW */
    .btn-copy { 
        background: var(--neon-green) !important; 
        color: black !important; 
        box-shadow: 0 0 15px rgba(0,255,65,0.4) !important; 
    }

    .btn-copy:hover { 
        background: white !important;
        transform: translateY(-2px) !important; 
        box-shadow: 0 0 25px var(--neon-green) !important; 
    }

    .btn-del { 
        background: #222 !important; 
        color: #666 !important; 
        border: 1px solid #333 !important;
    }
    .btn-del:hover {
        color: #ff4b4b !important;
        border-color: #ff4b4b !important;
    }
</style>
