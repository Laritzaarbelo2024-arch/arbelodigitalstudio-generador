
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Digital Studio | AI Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 30px; letter-spacing: -1px; }
        .grid { display: grid; gap: 20px; max-width: 400px; width: 100%; }
        .btn {
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Botón Visuales - Apunta a visuales.html */
        .btn-visuales {
            background: linear-gradient(135deg, #7c3aed, #db2777);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }
        /* Botón Prompts - Apunta a prompts.html */
        .btn-prompts {
            background: linear-gradient(135deg, #00f3ff, #00ff41);
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2);
        }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Arbelo Digital <span style="color:#7c3aed">Studio</span></h1>
        <div class="grid">
            <a href="visuales.html" class="btn btn-visuales">🎨 Generador de Visuales</a>
            <a href="prompts.html" class="btn btn-prompts">✍️ Mastermind Prompts V5</a>
        </div>
    </div>
</body>
</html>
