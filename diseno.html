<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prompt Engine Pro</title>

<style>
body{
font-family: Arial;
background:#fff8fb;
padding:20px;
}

h2{
color:#ff4fa3;
}

.block{
background:#ffffff;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
border:none;
padding:10px 14px;
margin:5px;
border-radius:999px;
cursor:pointer;
background:#ffd1dc;
color:#333;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#ff9ec4;
}

.clearBtn{
background:#ff6b6b;
color:white;
}

.outputBox{
display:flex;
gap:10px;
}

textarea{
width:50%;
height:200px;
border-radius:12px;
padding:10px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<h2>🧠 Prompt Engine Pro (Cozy Tech)</h2>

<!-- SUBJECT -->
<div class="block">
<h3>Sujeto</h3>
<button onclick="set('subject','woman')">Mujer</button>
<button onclick="set('subject','man')">Hombre</button>
<button onclick="set('subject','model')">Modelo</button>
<button onclick="set('subject','curvy latina woman')">Mujer latina curvilínea</button>
</div>

<!-- AGE / COUNTRY -->
<div class="block">
<h3>Contexto</h3>
<button onclick="set('context','young adult')">Joven adulto</button>
<button onclick="set('context','25 years old')">25 años</button>
<button onclick="set('context','latina')">Latina</button>
<button onclick="set('context','european')">Europea</button>
</div>

<!-- HAIR COLOR -->
<div class="block">
<h3>Color de pelo <button class="clearBtn" onclick="clearCat('hair_color')">X</button></h3>
<button onclick="set('hair_color','black hair')">Negro</button>
<button onclick="set('hair_color','blonde hair')">Rubio</button>
<button onclick="set('hair_color','brown hair')">Castaño</button>
<button onclick="set('hair_color','red hair')">Rojo</button>
</div>

<!-- HAIR STYLE -->
<div class="block">
<h3>Tipo de pelo <button class="clearBtn" onclick="clearCat('hair_style')">X</button></h3>
<button onclick="set('hair_style','straight hair')">Lacio</button>
<button onclick="set('hair_style','curly hair')">Rizado</button>
<button onclick="set('hair_style','wavy hair')">Ondulado</button>
</div>

<!-- OUTFIT -->
<div class="block">
<h3>Outfit</h3>
<button onclick="set('outfit','casual streetwear outfit')">Streetwear</button>
<button onclick="set('outfit','elegant luxury dress')">Elegante</button>
<button onclick="set('outfit','sport athleisure outfit')">Deportivo</button>
<button onclick="set('outfit','minimalist outfit')">Minimalista</button>
</div>

<!-- CAMERA -->
<div class="block">
<h3>Cámara</h3>
<button onclick="set('camera','close up shot')">Close Up</button>
<button onclick="set('camera','full body shot')">Full Body</button>
<button onclick="set('camera','low angle shot')">Low Angle</button>
<button onclick="set('camera','wide cinematic shot')">Cinemático</button>
</div>

<!-- LIGHT -->
<div class="block">
<h3>Luz</h3>
<button onclick="set('light','golden hour sunlight')">Golden Hour</button>
<button onclick="set('light','soft studio light')">Studio</button>
<button onclick="set('light','natural daylight')">Natural</button>
</div>

<!-- STYLE -->
<div class="block">
<h3>Estilo visual</h3>
<button onclick="set('style','ultra realistic')">Ultra Realista</button>
<button onclick="set('style','anime style')">Anime</button>
<button onclick="set('style','pixar style 3d render')">Pixar</button>
</div>

<!-- SCENE -->
<div class="block">
<h3>Escena</h3>
<button onclick="set('scene','urban city background')">Ciudad</button>
<button onclick="set('scene','beach adventure lifestyle')">Playa</button>
<button onclick="set('scene','luxury studio environment')">Estudio</button>
<button onclick="set('scene','fitness gym environment')">Gym</button>
</div>

<!-- PRODUCT SCENES -->
<div class="block">
<h3>Escenas de producto</h3>
<button onclick="set('scene','advertising product placement minimal background')">Producto minimal</button>
<button onclick="set('scene','luxury product commercial lighting')">Luxury ads</button>
<button onclick="set('scene','ecommerce studio product shot')">Ecommerce</button>
</div>

<!-- OUTPUT -->
<div class="block">
<h3>Resultado</h3>

<div class="outputBox">
<textarea id="es" placeholder="Español"></textarea>
<textarea id="en" placeholder="English"></textarea>
</div>

<button onclick="copyAll()">Copiar</button>
<button onclick="clearAll()">Limpiar</button>
</div>

<script>
let engine = {};

function set(key,value){
engine[key]=value;
build();
}

function clearCat(key){
delete engine[key];
build();
}

function build(){

let base = engine.style || "";
let subject = engine.subject || "";
let context = engine.context || "";
let hair = (engine.hair_color||"") + " " + (engine.hair_style||"");
let outfit = engine.outfit || "";
let camera = engine.camera || "";
let light = engine.light || "";
let scene = engine.scene || "";

// ESPAÑOL
document.getElementById("es").value =
`${subject}, ${context}, ${hair}, ${outfit}, ${scene}, iluminación ${light}, ${camera}, estilo ${base}`;

// ENGLISH
document.getElementById("en").value =
`${subject}, ${context}, ${hair}, ${outfit}, ${scene}, lighting ${light}, ${camera}, style ${base}`;
}

function copyAll(){
navigator.clipboard.writeText(
document.getElementById("es").value + "\n\n" + document.getElementById("en").value
);
}

function clearAll(){
engine={};
document.getElementById("es").value="";
document.getElementById("en").value="";
}
</script>

</body>
</html>
