

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbelo Vision Studio | Consola Cromática & 3D Pro</title>
    <style>
        :root { --verde: #2d5a27; --crema: #f4f9f1; --oro: #c5a059; --oscuro: #1a1a1a; --gpt: #10a37f; --higgs: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--oscuro); margin:0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-top: 15px solid var(--verde); text-align: center; }
        h1 { color: var(--verde); margin-bottom: 5px; font-size: 2.2rem; }
        .subtitle { font-size: 0.8rem; color: #999; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
        .section-title { background: var(--oro); color: white; padding: 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 900; margin-top: 35px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .category { margin-bottom: 10px; border: 1px solid #eee; border-radius: 15px; overflow: hidden; text-align: left; }
        .category-header { background: #fff; padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.9rem; color: var(--verde); }
        .category-content { display: none; padding: 20px; background: #fafafa; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; border-top: 1px solid #eee; }
        .category.active .category-content { display: grid; }
        .option-btn { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; color: #555; }
        .option-btn.active { background: var(--verde); color: white; border-color: var(--verde); font-weight: 700; }
        .result-area { margin-top: 50px; padding: 25px; background: var(--oscuro); color: #eee; border-radius: 25px; text-align: left; position: sticky; bottom: 20px; z-index: 1000; border: 2px solid var(--oro); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .prompt-text { font-family: 'Courier New', monospace; font-size: 0.85rem; min-height: 40px; display: block; color: #90ee90; line-height: 1.4; }
        .copy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 20px; }
        .btn-ia { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.6rem; text-transform: uppercase; color: white; transition: 0.3s; }
        .btn-mj { background: var(--verde); } .btn-gpt { background: var(--gpt); } .btn-higgs { background: var(--higgs); } .btn-reset { background: #444; }
        .btn-ia:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="container">
    <h1>Arbelo Vision Studio</h1>
    <div class="subtitle">Consola de Ingeniería Multi-Estilo & 3D</div>

    <div id="master-accordion"></div>

    <div class="result-area">
        <span style="color:var(--oro); font-size:0.7rem; font-weight:900;">ADN & MOTOR DE RENDER:</span>
        <span id="display-prompt" class="prompt-text">Define la identidad, colores y estilo (Foto o 3D)...</span>
        
        <div class="copy-grid">
            <button class="btn-ia btn-mj" onclick="copyMJ()">Midjourney</button>
            <button class="btn-ia btn-gpt" onclick="copyGPT()">ChatGPT</button>
            <button class="btn-ia btn-higgs" onclick="copyHiggs()">Higgsfield</button>
            <button class="btn-ia btn-reset" onclick="resetAll()">Limpiar</button>
        </div>
    </div>
</div>

<script>
    const sections = [
        { label: "BLOQUE 0: IDENTIDAD & ESTRATEGIA", cats: [
            { title: "Nicho de Servicio", key: "biz", opts: ["Consultoría", "Real Estate", "Salud/Bienestar", "Educación", "Estética", "Finanzas", "Marketing Digital"] },
            { title: "ADN Visual", key: "age", opts: ["Mujer Latina", "25-35 años", "35-45 años", "45-55 años", "60+ años", "Elegancia Europea"] }
        ]},
        { label: "BLOQUE 1: BRANDING CROMÁTICO", cats: [
            { title: "Paleta Principal", key: "col", opts: ["Old Money (Beige/Crema)", "Poder (Azul Marino/Gris)", "Barbie Core (Fucsia/Rosa)", "Luxury Noir (Negro/Plata)", "Boho Tierra (Ocre/Verde)", "Pure White (Blanco Puro)", "Royal (Azul/Oro)"] },
            { title: "Acentos de Metal", key: "met", opts: ["Detalles en Oro", "Detalles en Plata", "Oro Rosa", "Bronce Mate", "Sin Metales"] },
            { title: "Vibe Cromática", key: "vib", opts: ["Pasteles Suaves", "Monocromático", "Contraste Alto", "Tonos Desaturados", "Colores Vibrantes"] }
        ]},
        { label: "BLOQUE 2: PERSONAJE & ESCENA", cats: [
            { title: "Arquetipo Arbelo", key: "sub", opts: ["CEO Visionaria", "Mentora Zen", "Influencer de Lujo", "Estratega", "Líder Inspiradora"] },
            { title: "Escenario", key: "env", opts: ["Oficina Moderna", "Calle de París", "Terraza Mar Mediterráneo", "Estudio Minimalista", "Lobby Hotel 5*"] },
            { title: "Acción", key: "act", opts: ["Tomando Café", "Mirada de Poder", "Grabando Podcast", "Risa Genuina", "Analizando Datos"] }
        ]},
        { label: "BLOQUE 3: FOTOGRAFÍA (Si eliges Foto)", cats: [
            { title: "Iluminación", key: "lit", opts: ["Luz Ventana Natural", "Golden Hour", "Softbox Estudio", "Luz Invierno Fría"] },
            { title: "Lente & Calidad", key: "len", opts: ["85mm Portrait", "Shot on iPhone", "Poros Reales", "8K Cinematic"] }
        ]},
        { label: "BLOQUE 4: MOTOR VISUAL (FOTO vs 3D)", cats: [
            { title: "Estilo Motor", key: "mot", opts: ["Fotografía Realista", "Render 3D Hiper-Realista", "3D Animación de Lujo", "CGI Professional"] },
            { title: "Acabado de Render", key: "ren", opts: ["Acabado Mate (Clay)", "Acabado Glossy (Brillo)", "Textura Vinilo", "Sub-surface Scattering"] }
        ]}
    ];

    let selections = new Set();
    const main = document.getElementById('master-accordion');

    sections.forEach(sec => {
        const sTitle = document.createElement('div');
        sTitle.className = 'section-title';
        sTitle.innerText = sec.label;
        main.appendChild(sTitle);

        sec.cats.forEach(cat => {
            const cDiv = document.createElement('div');
            cDiv.className = 'category';
            cDiv.innerHTML = `<div class="category-header" onclick="this.parentElement.classList.toggle('active')">${cat.title} <span>+</span></div>
                             <div class="category-content"></div>`;
            main.appendChild(cDiv);
            const grid = cDiv.querySelector('.category-content');
            cat.opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if (selections.has(opt)) { selections.delete(opt); b.classList.remove('active'); }
                    else { selections.add(opt); b.classList.add('active'); }
                    update();
                };
                grid.appendChild(b);
            });
        });
    });

    function update() {
        const p = Array.from(selections).join(", ");
        document.getElementById('display-prompt').innerText = p || "Define tu marca, colores y estilo (Foto o 3D)...";
    }

    function copyMJ() {
        const t = document.getElementById('display-prompt').innerText;
        let p = `${t} --v 6.1 --ar 4:5 --stylize 250 --quality 2`;
        // Inteligencia Cromática
        if(t.includes("Old Money")) p = "soft neutral beige color palette, quiet luxury aesthetic, " + p;
        if(t.includes("Barbie Core")) p = "vibrant pink and fuchsia tones, high-fashion glam, " + p;
        if(t.includes("Luxury Noir")) p = "deep black and dark charcoal tones, moody luxury, " + p;
        
        // Inteligencia 3D & Motor de Render (Pulido Especial)
        if(t.includes("Render 3D Hiper-Realista") || t.includes("3D Animación") || t.includes("CGI Professional")) {
            p = "octane render, redshift, sub-surface scattering, highly detailed 3d render, stylized character design, " + p;
        }
        if(t.includes("3D Animación de Lujo")) p = "Pixar style, animation, high-end production, " + p;
        if(t.includes("CGI Professional")) p = "computer generated imagery, highly detailed 3d character, " + p;
        
        // Inteligencia de Acabado de Render
        if(t.includes("Acabado Mate")) p = "clay rendering, matte finish, soft lighting, " + p;
        if(t.includes("Acabado Glossy")) p = "glossy finish, reflections, studio lighting, " + p;
        if(t.includes("Textura Vinilo")) p = "vinyl material texture, " + p;

        if(t.includes("Tomando Café")) p = "steaming coffee cup, " + p;
        navigator.clipboard.writeText(p); alert("✨ Midjourney: ¡Marca & 3D Motor Copiado!");
    }

    function copyGPT() {
        const t = document.getElementById('display-prompt').innerText;
        navigator.clipboard.writeText(`High-end professional image with a ${t} color palette. Style: photorealistic or 3d render as selected.`);
        alert("🎨 ChatGPT: ¡Prompt Copiado!");
    }

    function resetAll() {
        selections.clear();
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        update();
    }
</script>
</body>
</html>
