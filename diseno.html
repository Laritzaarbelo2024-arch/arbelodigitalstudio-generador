

      <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laritza | AI Global Studio</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00f3ff;
            --bg-dark: #050505;
            --card-bg: #121212;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--neon-green); text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--neon-green); margin-bottom: 30px; text-shadow: 0 0 10px var(--neon-green); }

        .module {
            background: var(--card-bg);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            margin: 15px 0;
            width: 95%;
            max-width: 1000px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.05);
        }

        h3 { margin-top: 0; color: #fff; font-size: 0.85em; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75em;
            text-align: center;
            border-radius: 4px;
        }

        button:hover { border-color: var(--neon-green); color: white; background: #222; }

        button.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px var(--neon-green);
            border-color: white;
        }

        #master-panel {
            position: sticky;
            bottom: 20px;
            width: 95%;
            max-width: 1000px;
            background: rgba(10, 10, 10, 0.98);
            border: 2px solid var(--neon-blue);
            padding: 20px;
            margin-top: 50px;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.9);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.9em;
            padding: 5px 0;
        }

        #out-es { color: #ccc; height: 40px; border-bottom: 1px solid #222; }
        #out-en { color: var(--neon-blue); font-family: monospace; height: 60px; font-weight: bold; margin-top: 10px; }

        .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75em; }
        .btn-copy { background: var(--neon-blue); color: #000; }
        .btn-del { background: #333; color: #888; }
    </style>
</head>
<body>

    <h1>AI PROMPT ENGINE</h1>

    <div class="module" id="mod-id">
        <h3>👤 M1: IDENTIDAD & ORIGEN</h3>
        <div class="grid">
            <button onclick="setSubject('Cubana', 'Stunning Cuban woman, warm golden skin, authentic Caribbean features', 'Mujer Cubana de piel dorada')">🇨🇺 Cubana</button>
            <button onclick="setSubject('Dominicana', 'Radiant Dominican woman, honey skin, voluminous curls', 'Mujer Dominicana de piel canela')">🇩🇴 Dominicana</button>
            <button onclick="setSubject('Colombiana', 'Beautiful Colombian woman, dark expressive eyes, elegant charisma', 'Mujer Colombiana elegante')">🇨🇴 Colombiana</button>
            <button onclick="setSubject('Mexicana', 'Stunning Mexican woman, tan skin, striking features', 'Mujer Mexicana de piel bronceada')">🇲🇽 Mexicana</button>
            <button onclick="setSubject('Europea', 'Elegant European woman, fair skin, refined features', 'Mujer Europea de piel clara')">🇪🇺 Europea</button>
            <button onclick="setSubject('Asiática', 'Modern Japanese woman, porcelain skin, sleek obsidian hair', 'Mujer Asiática de piel porcelana')">🇯🇵 Asiática</button>
        </div>
    </div>

    <div class="module" id="mod-skin">
        <h3>🧬 M2: ADN DE PIEL (REALISMO EXTREMO)</h3>
        <div class="grid">
            <button class="multi" onclick="toggleSkin('Poros', 'micro-detailed skin pores, realistic skin texture', 'poros reales')">🧫 Poros Visibles</button>
            <button class="multi" onclick="toggleSkin('SSS', 'subsurface scattering, organic skin translucency', 'luz orgánica SSS')">💡 Luz Orgánica</button>
            <button class="multi" onclick="toggleSkin('Sudor', 'natural skin sweat, hydrated glow', 'brillo hidratado')">🧴 Sudor/Hidratación</button>
            <button class="multi" onclick="toggleSkin('Pecas', 'natural facial freckles and beauty marks', 'pecas naturales')">🍓 Pecas/Marcas</button>
        </div>
    </div>

    <div class="module" id="mod-cloth" style="border-left-color: var(--neon-blue);">
        <h3>🧥 M3: VESTUARIO & TELAS</h3>
        <div class="grid">
            <button onclick="setOutfit('Ejecutiva', 'wearing a sharp tailored business suit, crisp fabric', 'traje ejecutivo')">💼 Traje Sastre</button>
            <button onclick="setOutfit('Seda', 'wearing a luxurious high-gloss silk dress, liquid reflections', 'vestido de seda')">👗 Vestido Seda</button>
            <button onclick="setOutfit('Bikini', 'wearing a designer bikini, wet skin look', 'bikini de lujo')">👙 Bikini Editorial</button>
            <button onclick="setOutfit('Fitness', 'wearing high-waisted yoga spandex, compression fabric', 'ropa fitness')">🧘 Fitness/Yoga</button>
            <button onclick="setOutfit('Cuero', 'wearing a tight leather jacket, grainy texture', 'chaqueta de cuero')">🧥 Cuero Real</button>
        </div>
    </div>

    <div class="module" id="mod-cam" style="border-left-color: #ffcc00;">
        <h3>🎬 M4: ÓPTICA & ILUMINACIÓN</h3>
        <div class="grid">
            <button onclick="setCam('85mm', 'shot on 85mm lens, f/1.8, creamy bokeh background', 'Lente 85mm')">📸 Retrato 85mm</button>
            <button onclick="setCam('Alexa', 'shot on Arri Alexa LF, cinematic film grain', 'Cine Arri Alexa')">🎥 Formato Cine</button>
            <button onclick="setLight('Neón', 'emerald green neon rim lighting, dark atmosphere', 'Neón Verde')">🟢 Neón Verde</button>
            <button onclick="setLight('Rembrandt', 'dramatic Rembrandt studio lighting, volumetric shadows', 'Luz Rembrandt')">🎭 Luz Estudio</button>
        </div>
    </div>

    <div class="module" id="mod-loc" style="border-left-color: #ff00ff;">
        <h3>🏙️ M5: ESCENARIOS (LOCALIZACIONES)</h3>
        <div class="grid">
            <button onclick="setLoc('Tokyo', 'in a vibrant Tokyo street, neon signs, wet asphalt', 'Calle de Tokyo')">🗼 Tokyo Night</button>
            <button onclick="setLoc('Oficina', 'in a luxury executive office, city skyline', 'Oficina Lujo')">💼 Oficina CEO</button>
            <button onclick="setLoc('Playa', 'on a tropical Caribbean beach, turquoise water', 'Playa Caribe')">🏖️ Playa Paraíso</button>
            <button onclick="setLoc('Yate', 'on a private yacht deck, ocean horizon', 'Yate Privado')">🛥️ Yate de Lujo</button>
        </div>
    </div>

    <div class="module" id="mod-pose" style="border-left-color: #00ffcc;">
        <h3>💃 M6: POSES & FORMATOS</h3>
        <div class="grid">
            <button onclick="setPose('Full', 'full body shot, standing fashion pose', 'Cuerpo completo')">🧍 Full Body</button>
            <button onclick="setPose('Sentada', 'sitting elegantly, relaxed posture', 'Sentada')">🪑 Sentada</button>
            <button onclick="setPose('Vertical', '--ar 9:16', 'Formato Vertical')">📱 Vertical (Reels)</button>
            <button onclick="setPose('Post', '--ar 4:5', 'Formato Post')">🖼️ Instagram Post</button>
        </div>
    </div>

    <div id="master-panel">
        <div class="lang-label" style="color: #ffcc00;">🇪🇸 ESPAÑOL</div>
        <textarea id="out-es" readonly></textarea>
        <div class="lang-label" style="color: var(--neon-blue); margin-top: 10px;">🇺🇸 INGLÉS (COMMAND)</div>
        <textarea id="out-en" readonly></textarea>
        <div class="actions">
            <button class="btn btn-del" onclick="resetAll()">🗑️ Borrar</button>
            <button class="btn btn-copy" onclick="copyPrompt()">📋 Copiar Comando</button>
        </div>
    </div>

    <script>
        let data = { subj: { en: "", es: "" }, skin: [], cloth: { en: "", es: "" }, cam: { en: "", es: "" }, light: { en: "", es: "" }, loc: { en: "", es: "" }, pose: { en: "", es: "" } };

        function setSubject(name, en, es) { data.subj = { en, es }; update(); highlight(event.target, 'mod-id'); }
        function setOutfit(name, en, es) { data.cloth = { en, es }; update(); highlight(event.target, 'mod-cloth'); }
        function setCam(name, en, es) { data.cam = { en, es }; update(); highlight(event.target, 'mod-cam'); }
        function setLight(name, en, es) { data.light = { en, es }; update(); highlight(event.target, 'mod-cam'); }
        function setLoc(name, en, es) { data.loc = { en, es }; update(); highlight(event.target, 'mod-loc'); }
        function setPose(name, en, es) { data.pose = { en, es }; update(); highlight(event.target, 'mod-pose'); }

        function toggleSkin(name, en, es) {
            const i = data.skin.findIndex(s => s.en === en);
            if (i > -1) { data.skin.splice(i, 1); event.target.classList.remove('active'); }
            else { data.skin.push({ en, es }); event.target.classList.add('active'); }
            update();
        }

        function update() {
            let enArr = [], esArr = [];
            if (data.subj.en) { enArr.push(data.subj.en); esArr.push(data.subj.es); }
            if (data.skin.length > 0) { 
                enArr.push("with " + data.skin.map(s => s.en).join(', ')); 
                esArr.push("con " + data.skin.map(s => s.es).join(', '));
            }
            if (data.cloth.en) { enArr.push(data.cloth.en); esArr.push("vestida con " + data.cloth.es); }
            if (data.loc.en) { enArr.push(data.loc.en); esArr.push("en " + data.loc.es); }
            if (data.cam.en) { enArr.push(data.cam.en); esArr.push("usando " + data.cam.es); }
            if (data.light.en) { enArr.push(data.light.en); esArr.push("iluminada con " + data.light.es); }
            
            let finalEn = enArr.join(', ') + ", photorealistic, raw style, 8k";
            if (data.pose.en) finalEn += " " + data.pose.en; else finalEn += " --ar 9:16";

            if (enArr.length > 0) {
                document.getElementById('out-en').value = finalEn;
                document.getElementById('out-es').value = esArr.join(', ') + ".";
            } else {
                document.getElementById('out-en').value = ""; document.getElementById('out-es').value = "";
            }
        }

        function highlight(target, id) {
            document.getElementById(id).querySelectorAll('button:not(.multi)').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
        }

        function resetAll() {
            data = { subj: { en: "", es: "" }, skin: [], cloth: { en: "", es: "" }, cam: { en: "", es: "" }, light: { en: "", es: "" }, loc: { en: "", es: "" }, pose: { en: "", es: "" } };
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            update();
        }

        function copyPrompt() {
            const el = document.getElementById("out-en");
            if (!el.value) return;
            el.select();
            document.execCommand("copy");
            alert("✅ Comando copiado.");
        }
    </script>
</body>
</html>
