<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Visual Pro - Motor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#f8f3ff,#f0fbf7,#fff0f5);
    display:flex;
    justify-content:center;
}

.container{
    width:420px;
    height:90vh;
    overflow-y:auto;
    background:white;
    margin:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    padding:15px;
}

.header{
    text-align:center;
    font-size:16px;
    font-weight:bold;
    padding:15px;
}

.block-title{
    font-weight:bold;
    margin-top:10px;
}

.btn{
    padding:8px 10px;
    margin:4px;
    border-radius:18px;
    border:none;
    cursor:pointer;
    font-size:12px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
    transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.pink{background:#ff6fae;color:white;}
.green{background:#7de3b5;color:white;}
.blue{background:#7db7ff;color:white;}

.active{
    outline:2px solid #000;
}

textarea{
    width:100%;
    height:90px;
    border-radius:10px;
    border:1px solid #ddd;
    padding:8px;
}

.lang-container{
    display:flex;
    gap:10px;
}

.lang{
    width:50%;
}

.copy{
    background:#00c46a;
    color:white;
    margin-top:5px;
}

.clear{
    background:#00a85a;
    color:white;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
SISTEMA MODULAR VISUAL PRO (CORE LOCKED)
</div>

<!-- BLOQUES SIMPLES DEMO -->
<div class="block-title">🌎 Identidad</div>
<button class="btn pink" onclick="selectOption('identity','latina',this)">latina</button>
<button class="btn pink" onclick="selectOption('identity','europea',this)">europea</button>

<div class="block-title">💋 Labios</div>
<button class="btn pink" onclick="selectOption('lips','rojos intensos',this)">rojos intensos</button>
<button class="btn pink" onclick="selectOption('lips','naturales',this)">naturales</button>

<div class="block-title">😊 Sonrisa</div>
<button class="btn blue" onclick="selectOption('smile','elegante',this)">elegante</button>
<button class="btn blue" onclick="selectOption('smile','natural',this)">natural</button>

<div class="block-title">👁️ Mirada</div>
<button class="btn blue" onclick="selectOption('look','directa',this)">directa</button>
<button class="btn blue" onclick="selectOption('look','lateral',this)">lateral</button>

<div class="block-title">💇 Peinado</div>
<button class="btn green" onclick="selectOption('hair','rizado',this)">rizado</button>
<button class="btn green" onclick="selectOption('hair','liso',this)">liso</button>

<div class="block-title">👠 Zapatos</div>
<button class="btn pink" onclick="selectOption('shoes','tacones',this)">tacones</button>
<button class="btn pink" onclick="selectOption('shoes','sneakers',this)">sneakers</button>

<div class="block-title">💍 Accesorios</div>
<button class="btn green" onclick="selectOption('accessories','collar de lujo',this)">collar</button>
<button class="btn green" onclick="selectOption('accessories','sin accesorios',this)">ninguno</button>

<hr>

<div class="lang-container">

<div class="lang">
<textarea id="es" placeholder="Español"></textarea>
<button class="btn copy" onclick="copyText('es')">Copiar</button>
<button class="btn clear" onclick="clearText('es')">Eliminar</button>
</div>

<div class="lang">
<textarea id="en" placeholder="English"></textarea>
<button class="btn copy" onclick="copyText('en')">Copy</button>
<button class="btn clear" onclick="clearText('en')">Clear</button>
</div>

</div>

</div>

<script>

let state = {
    identity:"",
    lips:"",
    smile:"",
    look:"",
    hair:"",
    shoes:"",
    accessories:""
};

function selectOption(category,value,btn){

    state[category] = value;

    let buttons = btn.parentNode.querySelectorAll("button");
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    buildPrompt();
}

function buildPrompt(){

    let promptES =
    `Mujer ${state.identity}, labios ${state.lips}, sonrisa ${state.smile}, mirada ${state.look}, cabello ${state.hair}, usa ${state.accessories}, calzado ${state.shoes}, escena cinematográfica, iluminación natural, estilo editorial, ultra realista 8k, formato 9:16.`;

    let promptEN =
    `Woman ${state.identity}, lips ${state.lips}, smile ${state.smile}, look ${state.look}, hair ${state.hair}, wearing ${state.accessories}, shoes ${state.shoes}, cinematic scene, natural lighting, editorial style, ultra realistic 8k, 9:16 format.`;

    document.getElementById("es").value = promptES;
    document.getElementById("en").value = promptEN;
}

function copyText(id){
    navigator.clipboard.writeText(document.getElementById(id).value);
}

function clearText(id){
    document.getElementById(id).value = "";
}

</script>

</body>
</html>
